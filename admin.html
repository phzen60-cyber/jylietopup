<!DOCTYPE html>
<html>
<body style="background:#0f172a;color:#fff;font-family:Arial;padding:20px;text-align:center">
  <div id="loginBox">
    <h1>🔐 Login Test</h1>
    <input id="user" placeholder="Username" style="padding:12px;margin:8px;width:200px"><br>
    <input id="pass" type="password" placeholder="Password" style="padding:12px;margin:8px;width:200px"><br>
    <button id="btn" style="padding:16px 32px;background:#06b6d4;border:0;border-radius:8px;font-weight:700">Login</button>
    <p id="msg" style="color:red;margin-top:16px"></p>
  </div>

  <div id="adminBox" style="display:none">
    <h1 style="color:#4ade80">✅ BERHASIL MASUK DASHBOARD!</h1>
    <p>Tombol BUKA: <button onclick="alert('BUKA KEPENCET')" style="padding:20px;font-size:20px">🟢 BUKA</button></p>
  </div>

  <script>
    alert('1. Script ke-load!');

    document.getElementById('btn').onclick = function() {
      alert('2. Tombol Login kepencet!');
      
      var u = document.getElementById('user').value;
      var p = document.getElementById('pass').value;
      
      alert('3. Username: ' + u + ' | Pass: ' + p);
      
      if(u.trim().toLowerCase() === 'ownerjylie' && p.trim() === 'jylie547') {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminBox').style.display = 'block';
      } else {
        document.getElementById('msg').innerHTML = 'Salah! Pake ownerjylie / jylie547';
      }
    };
  </script>
</body>
</html>
