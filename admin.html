<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>Admin Panel - Jylie Topup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        *{font-family:'Poppins',sans-serif;-webkit-tap-highlight-color:transparent}
        body{background:#0f172a!important}
      .glass{background:rgba(30,41,59,0.8)!important;backdrop-filter:blur(12px)!important;border:1px solid rgba(51,65,85,0.5)!important}
      .admin-btn{transition:all.2s!important}
      .admin-btn:active{transform:scale(.97)!important}
    </style>
</head>
<body class="text-white" onload="alert('JS NYALA BRO ✅\n\nKalo popup ini muncul, tombol login pasti bisa di-klik')">

    <!-- LOGIN -->
    <div id="loginBox" class="min-h-screen flex items-center justify-center p-4" style="background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%)">
        <div class="glass rounded-2xl p-8 w-full max-w-sm">
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-2xl mx-auto mb-4 flex items-center justify-center" style="background:linear-gradient(135deg,#22d3ee 0%,#3b82f6 100%)">
                    <i class="ri-shield-keyhole-fill text-3xl" style="color:#0f172a"></i>
                </div>
                <h1 class="text-2xl font-bold">Admin JylieTopup</h1>
                <p style="color:#94a3b8" class="text-sm mt-1">Masuk ke dashboard</p>
            </div>
            <div class="space-y-4">
                <div class="relative">
                    <i class="ri-user-line absolute left-3 top-3.5" style="color:#94a3b8"></i>
                    <input id="user" type="text" placeholder="Username" style="width:100%;background:rgba(51,65,85,0.5);border:1px solid #475569;padding:12px 12px 12px 40px;border-radius:12px;outline:none;color:#fff" onfocus="this.style.boxShadow='0 0 0 2px #06b6d4'" onblur="this.style.boxShadow='none'">
                </div>
                <div class="relative">
                    <i class="ri-lock-line absolute left-3 top-3.5" style="color:#94a3b8"></i>
                    <input id="pass" type="password" placeholder="Password" style="width:100%;background:rgba(51,65,85,0.5);border:1px solid #475569;padding:12px 12px 12px 40px;border-radius:12px;outline:none;color:#fff" onfocus="this.style.boxShadow='0 0 0 2px #06b6d4'" onblur="this.style.boxShadow='none'">
                </div>
                <button type="button" onclick="cekLogin()" style="width:100%;background:linear-gradient(90deg,#06b6d4 0%,#3b82f6 100%);color:#0f172a;padding:12px;border-radius:12px;font-weight:700;border:0;cursor:pointer" class="admin-btn flex items-center justify-center gap-2">
                    <i class="ri-login-box-line"></i> Login
                </button>
                <p id="loginMsg" style="color:#f87171" class="text-sm text-center h-5"></p>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="adminBox" style="display:none">
        <header class="glass shadow-2xl sticky top-0" style="z-index:50">
            <div class="container mx-auto px-4 py-4 flex justify-between items-center" style="max-width:1200px">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,#22d3ee 0%,#3b82f6 100%)">
                        <i class="ri-gamepad-line text-xl" style="color:#0f172a"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold">JylieTopup</h1>
                        <p style="color:#94a3b8" class="text-xs">Admin Panel</p>
                    </div>
                <button type="button" onclick="logout()" style="background:rgba(239,68,0.2);color:#f87171;padding:8px 16px;border-radius:12px;font-size:14px;border:0;cursor:pointer" class="admin-btn flex items-center gap-2">
                    <i class="ri-logout-box-line"></i> Logout
                </button>
            </div>
        </header>
        <main class="container mx-auto px-4 py-8" style="max-width:1200px">
            <div class="glass rounded-2xl p-6 text-center">
                <i class="ri-checkbox-circle-line text-6xl" style="color:#4ade80"></i>
                <h2 class="text-2xl font-bold mt-4">LOGIN BERHASIL BRO!</h2>
                <p style="color:#94a3b8" class="mt-2">Tombol bisa di-klik kan? Dashboard full nya pake kode sebelumnya aja, yg penting login udah bener.</p>
            </div>
        </main>
    </div>

<script>
// PAKE CARA PALING KUNO BIAR KEBACA SEMUA HP
function cekLogin() {
  var user = document.getElementById('user').value;
  var pass = document.getElementById('pass').value;
  var msg = document.getElementById('loginMsg');
  
  // TRIM SPASI + KECILIN
  user = user.replace(/^\s+|\s+$/g, '').toLowerCase();
  pass = pass.replace(/^\s+|\s+$/g, '');
  
  if(user === 'ownerjylie' && pass === 'jylie547') {
    alert('LOGIN SUKSES BRO!');
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('adminBox').style.display = 'block';
  } else {
    msg.innerHTML = 'Username/Password salah! Kamu ketik: ' + user;
  }
}

function logout() {
  document.getElementById('adminBox').style.display = 'none';
  document.getElementById('loginBox').style.display = 'flex';
  document.getElementById('user').value = '';
  document.getElementById('pass').value = '';
  document.getElementById('loginMsg').innerHTML = '';
}
</script>
</body>
</html>
