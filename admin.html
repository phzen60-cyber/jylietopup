<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Admin JylieTopup</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0f172a;color:#e2e8f0;font-family:sans-serif;touch-action:manipulation}
button{cursor:pointer;border:0;font-family:inherit}
.login{display:flex;min-height:100vh;align-items:center;justify-content:center;padding:16px}
.box{background:#1e293b;padding:24px;border-radius:12px;width:100%;max-width:360px;border:1px solid #334155}
.input{width:100%;padding:12px;margin:8px 0;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#fff}
.btn{width:100%;padding:12px;background:#06b6d4;color:#0f172a;font-weight:bold;border-radius:8px;margin-top:8px}
.btn:active{background:#0891b2;transform:scale(.96)}
.admin{display:none}
.header{background:#1e293b;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #334155}
.nav{display:flex;gap:8px;padding:16px;overflow-x:auto}
.nav button{padding:10px 16px;background:#334155;border-radius:8px;white-space:nowrap;color:#e2e8f0}
.nav button.active{background:#06b6d4;color:#0f172a;font-weight:bold}
.page{padding:0 16px 16px;display:none}
.page.show{display:block}
.card{background:#1e293b;padding:16px;border-radius:12px;margin-bottom:16px;border:1px solid #334155}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat{background:#1e293b;padding:16px;border-radius:12px;border:1px solid #334155}
.stat p{font-size:12px;color:#94a3b8;margin-bottom:4px}
.stat b{font-size:20px}
.green{color:#4ade80}.yellow{color:#facc15}.cyan{color:#22d3ee}.red{color:#f87171}
.btn2{flex:1;padding:12px;border-radius:8px;font-weight:bold;color:#fff}
.buka{background:#16a34a}.tutup{background:#475569}
.err{color:#f87171;text-align:center;margin-top:8px;font-size:14px}
.sidebar{position:fixed;left:-100%;top:0;width:256px;height:100%;background:#1e293b;border-right:1px solid #334155;transition:.3s;z-index:50;padding:16px}
.sidebar.open{left:0}
.overlay{position:fixed;inset:0;background:#0008;z-index:40;display:none}
.overlay.show{display:block}
@media(min-width:768px){.sidebar{left:0}.main{margin-left:256px}.mob{display:none}}
</style>
</head>
<body>

<div id="login" class="login">
  <div class="box">
    <h1 style="text-align:center;margin-bottom:24px;font-size:24px"><i class="ri-flashlight-fill" style="color:#06b6d4"></i> Admin Jylie</h1>
    <input id="u" class="input" placeholder="Username">
    <input id="p" type="password" class="input" placeholder="Password">
    <button type="button" onclick="masuk()" class="btn">LOGIN</button>
    <p id="err" class="err"></p>
  </div>
</div>

<div id="admin" class="admin">
  <div id="overlay" class="overlay" onclick="toggle()"></div>

  <div id="sidebar" class="sidebar">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:32px">
      <b style="font-size:18px"><i class="ri-flashlight-fill" style="color:#06b6d4"></i> JylieTopup</b>
      <button type="button" onclick="toggle()" class="mob" style="font-size:24px;background:0;color:#fff">×</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:4px">
      <button type="button" onclick="hal('dash',this)" class="navbtn active" style="padding:12px;background:#0f172a;border-radius:8px;text-align:left;border-left:3px solid #06b6d4"><i class="ri-dashboard-line"></i> Dashboard</button>
      <button type="button" onclick="hal('order',this)" class="navbtn" style="padding:12px;background:0;border-radius:8px;text-align:left;color:#e2e8f0"><i class="ri-shopping-bag-3-line"></i> Pesanan</button>
      <button type="button" onclick="hal('produk',this)" class="navbtn" style="padding:12px;background:0;border-radius:8px;text-align:left;color:#e2e8f0"><i class="ri-gamepad-line"></i> Produk</button>
      <button type="button" onclick="hal('set',this)" class="navbtn" style="padding:12px;background:0;border-radius:8px;text-align:left;color:#e2e8f0"><i class="ri-settings-3-line"></i> Setting</button>
    </div>
    <button type="button" onclick="keluar()" style="position:absolute;bottom:16px;left:16px;right:16px;background:#ef444420;color:#f87171;padding:10px;border-radius:8px"><i class="ri-logout-box-r-line"></i> Logout</button>
  </div>

  <div class="main">
    <div class="header">
      <button type="button" onclick="toggle()" class="mob" style="font-size:24px;background:0;color:#fff">☰</button>
      <b id="title">Dashboard</b>
      <img src="https://i.pravatar.cc/32" style="width:32px;height:32px;border-radius:50%">
    </div>

    <div class="nav">
      <button type="button" onclick="hal('dash',this)" class="active">Dashboard</button>
      <button type="button" onclick="hal('order',this)">Pesanan</button>
      <button type="button" onclick="hal('produk',this)">Produk</button>
      <button type="button" onclick="hal('set',this)">Setting</button>
    </div>

    <div id="dash" class="page show">
      <div class="grid">
        <div class="stat"><p>Pendapatan Hari Ini</p><b class="green" id="duit">Rp 0</b></div>
        <div class="stat"><p>Total Pesanan</p><b class="cyan" id="total">0</b></div>
        <div class="stat"><p>Order Pending</p><b class="yellow" id="pending">0</b></div>
        <div class="stat"><p>Status Toko</p><b id="sttoko">-</b></div>
      </div>
      <div class="card"><b>Pesanan Terbaru</b><div id="recent" style="margin-top:12px;color:#64748b">Belum ada data</div></div>
    </div>

    <div id="order" class="page">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <b>Kelola Order</b>
          <button type="button" onclick="loadOrder()" style="background:#334155;padding:8px 12px;border-radius:8px;color:#fff">🔄 Refresh</button>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:12px;overflow-x:auto">
          <button type="button" onclick="filterO('all',this)" class="fbtn" style="background:#06b6d4;color:#0f172a;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:bold">Semua</button>
          <button type="button" onclick="filterO('Diproses',this)" class="fbtn" style="background:#334155;padding:6px 12px;border-radius:8px;font-size:12px;color:#fff">Diproses</button>
          <button type="button" onclick="filterO('Selesai',this)" class="fbtn" style="background:#334155;padding:6px 12px;border-radius:8px;font-size:12px;color:#fff">Selesai</button>
        </div>
        <div id="listorder" style="color:#64748b">Klik Refresh buat load order</div>
      </div>
    </div>

    <div id="produk" class="page">
      <div class="card">
        <b>Tambah Game</b>
        <input id="gid" class="input" placeholder="ID: freefire">
        <input id="gname" class="input" placeholder="Nama: Free Fire">
        <input id="gicon" class="input" placeholder="Link Logo">
        <button type="button" onclick="addGame()" class="btn">+ Tambah Game</button>
      </div>
      <div class="card"><b>List Game</b><div id="listgame" style="margin-top:12px;color:#64748b">Belum ada game</div></div>
    </div>

    <div id="set" class="page">
      <div class="card" style="border:2px solid #eab308">
        <b>Setting GitHub - WAJIB ISI</b>
        <input id="gtoken" type="password" class="input" placeholder="Token: ghp_xxx">
        <input id="guser" class="input" placeholder="Username: phzen60-cyber">
        <input id="grepo" class="input" placeholder="Repo: jylietopup">
      </div>
      <div class="card">
        <b>Setting Umum</b>
        <p style="font-size:14px;margin:12px 0 8px">Status Toko</p>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button type="button" onclick="setToko(1)" id="buka" class="btn2 tutup">🟢 BUKA</button>
          <button type="button" onclick="setToko(0)" id="tutup" class="btn2 tutup">🔴 TUTUP</button>
        </div>
        <input id="tele" class="input" placeholder="Username Telegram CS">
      </div>
      <button type="button" onclick="simpan()" class="btn" style="background:#16a34a">🔒 Simpan ke GitHub</button>
      <p id="notif" style="text-align:center;margin-top:12px"></p>
    </div>
  </div>
</div>

<script>
var DB = {toko_buka:1,games:[],tele:''};
var ORDERS = [];
var FIL = 'all';

function masuk(){
  if(u.value=='ownerjylie'&&p.value=='jylie547'){
    login.style.display='none';
    admin.style.display='block';
    loadData();
    loadSet();
    loadOrder();
  }else{
    err.innerText='Username/Password salah!';
  }
}
function keluar(){
  admin.style.display='none';
  login.style.display='flex';
  u.value=p.value=err.innerText='';
}
function toggle(){
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
}
function hal(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.getElementById(id).classList.add('show');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  if(el.classList.contains('navbtn')){
    document.querySelectorAll('.navbtn').forEach(b=>{b.style.background='0';b.style.borderLeft='0'});
    el.style.background='#0f172a';el.style.borderLeft='3px solid #06b6d4';
  }else el.classList.add('active');
  title.innerText=el.innerText.trim();
  if(id=='produk')renderGame();
  if(window.innerWidth<768)toggle();
}
function loadSet(){
  gtoken.value=localStorage.gtoken||'';
  guser.value=localStorage.guser||'';
  grepo.value=localStorage.grepo||'';
}
function setToko(s){
  DB.toko_buka=s;
  buka.className=s?'btn2 buka':'btn2 tutup';
  tutup.className=!s?'btn2 buka':'btn2 tutup';
  sttoko.innerText=s?'BUKA':'TUTUP';
  sttoko.className=s?'green':'red';
}
function loadData(){
  fetch('db.json?'+Date.now()).then(r=>r.json()).then(d=>{
    DB=d;
    tele.value=DB.tele||'';
    setToko(DB.toko_buka!==0);
    renderGame();
  }).catch(e=>{
    DB={toko_buka:1,games:[],tele:'jyliestoreid'};
    setToko(1);
  });
}
function renderGame(){
  listgame.innerHTML=DB.games.length?DB.games.map((g,i)=>`
    <div style="background:#0f172a;padding:12px;border-radius:8px;margin-bottom:8px;border:1px solid #334155">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="display:flex;gap:12px;align-items:center">
          <img src="${g.icon}" style="width:40px;height:40px;border-radius:8px;object-fit:cover;background:#334155">
          <div><b>${g.name}</b><br><small style="color:#94a3b8">ID: ${g.id}</small></div>
        </div>
        <button type="button" onclick="delGame(${i})" style="background:#ef444420;color:#f87171;padding:6px 12px;border-radius:6px">Hapus</button>
      </div>
      <input value="${g.icon}" onchange="DB.games[${i}].icon=this.value" class="input" style="font-size:12px;padding:8px" placeholder="Link Logo">
      <div id="nom${i}" style="margin:8px 0"></div>
      <button type="button" onclick="addNom(${i})" style="width:100%;background:#334155;padding:8px;border-radius:6px;color:#fff;font-size:14px">+ Tambah Nominal</button>
    </div>
  `).join(''):'<p style="color:#64748b;text-align:center">Belum ada game</p>';
  DB.games.forEach((g,i)=>{
    document.getElementById('nom'+i).innerHTML=g.products.map((p,j)=>`
      <div style="background:#0f172a;padding:8px;border-radius:6px;margin-bottom:6px">
        <div style="display:flex;gap:6px;margin-bottom:6px">
          <input value="${p.name}" onchange="DB.games[${i}].products[${j}].name=this.value" class="input" style="flex:1;padding:8px;font-size:14px" placeholder="Nama Item">
          <button type="button" onclick="delNom(${i},${j})" style="background:#ef444420;color:#f87171;padding:8px;border-radius:6px">×</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
          <input value="${p.harga}" type="number" onchange="DB.games[${i}].products[${j}].harga=+this.value||0" class="input" style="padding:8px;font-size:14px" placeholder="Harga Jual">
          <input value="${p.harga_asli||''}" type="number" onchange="DB.games[${i}].products[${j}].harga_asli=+this.value||0" class="input" style="padding:8px;font-size:14px" placeholder="Harga Asli">
        </div>
      </div>
    `).join('');
  });
}
function addGame(){
  var id=gid.value.trim().toLowerCase();
  var name=gname.value.trim();
  var icon=gicon.value.trim();
  if(!id||!name||!icon)return alert('Lengkapi semua!');
  if(DB.games.find(g=>g.id==id))return alert('ID sudah ada!');
  DB.games.push({id,name,icon,products:[]});
  gid.value=gname.value=gicon.value='';
  renderGame();
}
function delGame(i){
  if(confirm('Hapus '+DB.games[i].name+'?')){
    DB.games.splice(i,1);
    renderGame();
  }
}
function addNom(i){
  DB.games[i].products.push({id:'item_'+Date.now(),name:"Item Baru",harga:10000});
  renderGame();
}
function delNom(i,j){
  DB.games[i].products.splice(j,1);
  renderGame();
}
function simpan(){
  var token=gtoken.value,user=guser.value,repo=grepo.value;
  if(!token||!user||!repo)return alert('Isi Setting GitHub dulu!');
  localStorage.gtoken=token;localStorage.guser=user;localStorage.grepo=repo;
  notif.innerText='Menyimpan...';notif.className='green';
  DB.tele=tele.value;
  var content=btoa(unescape(encodeURIComponent(JSON.stringify(DB,null,2))));
  var url=`https://api.github.com/repos/${user}/${repo}/contents/db.json`;
  fetch(url,{headers:{'Authorization':'token '+token}}).then(r=>r.json()).then(f=>{
    fetch(url,{
      method:'PUT',
      headers:{'Authorization':'token '+token,'Content-Type':'application/json'},
      body:JSON.stringify({message:'Update db.json',content:content,sha:f.sha})
    }).then(r=>r.ok?notif.innerText='✅ Sukses!':notif.innerText='❌ Gagal');
  });
}
function loadOrder(){
  fetch('./orders.json?'+Date.now()).then(r=>r.json()).then(d=>{
    ORDERS=d.orders.reverse();
    var today=new Date().toISOString().split('T')[0];
    var todayO=ORDERS.filter(o=>o.waktu.startsWith(today)&&o.status=='Selesai');
    duit.innerText='Rp '+todayO.reduce((s,o)=>s+o.harga,0).toLocaleString('id-ID');
    total.innerText=ORDERS.length;
    pending.innerText=ORDERS.filter(o=>o.status=='Diproses').length;
    recent.innerHTML=ORDERS.slice(0,3).map(o=>`
      <div style="background:#0f172a;padding:12px;border-radius:8px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between">
          <b style="font-size:14px">${o.kode}</b>
          <span style="font-size:12px;padding:2px 8px;border-radius:12px;background:${o.status=='Selesai'?'#16a34a20':'#eab30820'};color:${o.status=='Selesai'?'#4ade80':'#facc15'}">${o.status}</span>
        </div>
        <p style="font-size:12px;color:#94a3b8;margin-top:4px">${o.game} - ${o.item}</p>
      </div>
    `).join('')||'<p style="color:#64748b;text-align:center">Belum ada order</p>';
    renderO();
  }).catch(e=>listorder.innerHTML='<p style="color:#f87171">Gagal load orders.json</p>');
}
function filterO(s,el){
  FIL=s;
  document.querySelectorAll('.fbtn').forEach(b=>{b.style.background='#334155';b.style.color='#fff';b.style.fontWeight='normal'});
  el.style.background='#06b6d4';el.style.color='#0f172a';el.style.fontWeight='bold';
  renderO();
}
function renderO(){
  var f=FIL=='all'?ORDERS:ORDERS.filter(o=>o.status==FIL);
  listorder.innerHTML=f.length?f.map(o=>`
    <div style="background:#0f172a;padding:12px;border-radius:8px;margin-bottom:8px;border-left:3px solid ${o.status=='Selesai'?'#16a34a':'#eab308'}">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <div><b>${o.kode}</b><br><small style="color:#94a3b8">${o.waktu}</small></div>
        <span style="font-size:12px;padding:4px 12px;border-radius:12px;background:${o.status=='Selesai'?'#16a34a':'#eab308'};color:#0f172a;font-weight:bold">${o.status}</span>
      </div>
      <p style="font-size:14px"><b>${o.game}</b> - ${o.item}</p>
      <p style="font-size:12px;color:#94a3b8">ID: ${o.playerId} | ${o.namaPengirim}</p>
      <p style="color:#22d3ee;font-weight:bold;margin:4px 0">Rp${o.harga.toLocaleString('id-ID')}</p>
      ${o.status!='Selesai'?`<button type="button" onclick="doneO('${o.kode}')" style="width:100%;background:#16a34a;padding:8px;border-radius:6px;color:#fff;font-weight:bold;margin-top:8px">✓ Tandai Selesai</button>`:''}
    </div>
  `).join(''):'<p style="color:#64748b;text-align:center">Ga ada order</p>';
}
function doneO(kode){
  if(!confirm('Yakin udah kirim diamond untuk '+kode+'?'))return;
  var token=gtoken.value,user=guser.value,repo=grepo.value;
  if(!token||!user||!repo)return alert('Isi Setting GitHub dulu!');
  var url=`https://api.github.com/repos/${user}/${repo}/contents/orders.json`;
  fetch(url,{headers:{'Authorization':'token '+token}}).then(r=>r.json()).then(f=>{
    var c=JSON.parse(decodeURIComponent(escape(atob(f.content))));
    var i=c.orders.findIndex(o=>o.kode==kode);
    if(i==-1)return alert('Order ga ketemu');
    c.orders[i].status='Selesai';
    fetch(url,{
      method:'PUT',
      headers:{'Authorization':'token '+token,'Content-Type':'application/json'},
      body:JSON.stringify({message:'Order '+kode+' selesai',content:btoa(unescape(encodeURIComponent(JSON.stringify(c,null,2)))),sha:f.sha})
    }).then(r=>r.ok?loadOrder():alert('Gagal update'));
  });
}
</script>
</body>
</html>
