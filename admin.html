<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Jylie Topup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
     .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
     .admin-btn { transition: all 0.2s ease; }
     .admin-btn:active { transform: scale(0.98); }
     .admin-input { background: #1e293b; border: 1px solid #334155; }
     .admin-input:focus { outline: none; border-color: #06b6d4; box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.2); }
     .notif-sukses { color: #4ade80; }
     .notif-gagal { color: #f87171; }
     .menu-active { background: linear-gradient(90deg, #06b6d4, #0891b2); color: #0f172a; font-weight: 700; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-white">

    <!-- LOGIN -->
    <div id="loginBox" class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-950 via-slate-900 to-cyan-950">
        <div class="glass rounded-2xl p-8 w-full max-w-sm">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-extrabold text-white">Admin Jylie</h1>
                <p class="text-slate-400 text-sm mt-1">Topup Dashboard</p>
            </div>
            <input id="user" type="text" placeholder="Username" class="w-full admin-input p-3.5 rounded-xl mb-3 text-sm">
            <input id="pass" type="password" placeholder="Password" class="w-full admin-input p-3.5 rounded-xl mb-4 text-sm">
            <button onclick="login()" class="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-900 py-3.5 rounded-xl font-bold admin-btn">Masuk</button>
            <p id="loginMsg" class="text-red-400 text-sm mt-4 text-center h-5"></p>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="adminBox" class="hidden min-h-screen">
        <header class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-10">
            <div class="flex justify-between items-center">
                <h1 class="text-xl font-extrabold">🎮 Admin Jylie</h1>
                <button onclick="logout()" class="bg-red-500/20 text-red-400 px-4 py-2 rounded-lg text-sm">Logout</button>
            </div>
            <div class="flex gap-2 mt-4 overflow-x-auto pb-2">
                <button onclick="showSection('dashboard', this)" class="menu-tab menu-active px-4 py-2 rounded-lg text-sm whitespace-nowrap">Dashboard</button>
                <button onclick="showSection('game', this)" class="menu-tab bg-slate-800 px-4 py-2 rounded-lg text-sm whitespace-nowrap">Game</button>
                <button onclick="showSection('order', this)" class="menu-tab bg-slate-800 px-4 py-2 rounded-lg text-sm whitespace-nowrap">Order</button>
                <button onclick="showSection('setting', this)" class="menu-tab bg-slate-800 px-4 py-2 rounded-lg text-sm whitespace-nowrap">Setting</button>
            </div>
        </header>

        <main class="p-4 md:p-6">
            <!-- SECTION: DASHBOARD -->
            <section id="section-dashboard" class="space-y-5">
                <h2 class="text-2xl font-extrabold">Dashboard</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass rounded-xl p-4">
                        <p class="text-slate-400 text-xs">Total Order</p>
                        <p id="total-order" class="text-2xl font-extrabold mt-1">0</p>
                    </div>
                    <div class="glass rounded-xl p-4">
                        <p class="text-slate-400 text-xs">Diproses</p>
                        <p id="total-proses" class="text-2xl font-extrabold mt-1 text-yellow-400">0</p>
                    </div>
                <div class="glass rounded-xl p-4">
                    <p class="text-slate-400 text-sm">Status Toko</p>
                    <p id="status-toko" class="text-2xl font-extrabold mt-1 text-green-400">BUKA</p>
                </div>
            </section>

            <!-- SECTION: GAME -->
            <section id="section-game" class="hidden space-y-5">
                <h2 class="text-2xl font-extrabold">Kelola Game & Produk</h2>
                <div class="glass rounded-xl p-4">
                    <h3 class="font-bold mb-3">+ Tambah Game Baru</h3>
                    <input id="newGameId" type="text" placeholder="ID: freefire" class="admin-input p-3 rounded-lg text-sm w-full mb-2">
                    <input id="newGameName" type="text" placeholder="Nama: Free Fire" class="admin-input p-3 rounded-lg text-sm w-full mb-2">
                    <input id="newGameLogo" type="text" placeholder="Link Logo" class="admin-input p-3 rounded-lg text-sm w-full mb-3">
                    <button onclick="tambahGame()" class="w-full bg-cyan-500 text-slate-900 py-3 rounded-lg font-bold admin-btn">+ Tambah Game</button>
                </div>
                <div id="produkList" class="space-y-3"></div>
            </section>

            <!-- SECTION: ORDER -->
            <section id="section-order" class="hidden space-y-5">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-extrabold">Kelola Order</h2>
                    <button onclick="loadOrders()" class="bg-slate-800 px-4 py-2 rounded-lg text-sm">🔄</button>
                </div>
                <div class="flex gap-2">
                    <button onclick="filterOrder('all')" class="filter-btn bg-cyan-500 text-slate-900 px-3 py-1.5 rounded-lg text-xs font-bold">Semua</button>
                    <button onclick="filterOrder('Diproses')" class="filter-btn bg-slate-800 px-3 py-1.5 rounded-lg text-xs">Diproses</button>
                    <button onclick="filterOrder('Selesai')" class="filter-btn bg-slate-800 px-3 py-1.5 rounded-lg text-xs">Selesai</button>
                </div>
                <div id="order-list" class="space-y-3"></div>
            </section>

            <!-- SECTION: SETTING -->
            <section id="section-setting" class="hidden space-y-5">
                <h2 class="text-2xl font-extrabold">Setting</h2>
                <div class="glass rounded-xl p-4 border-2 border-yellow-500/30">
                    <h3 class="font-bold mb-3">GitHub - WAJIB ISI</h3>
                    <input id="gh-token" type="password" placeholder="Token: ghp_xxx" class="w-full admin-input p-3 rounded-lg mb-2 text-sm">
                    <input id="gh-user" type="text" placeholder="Username" class="w-full admin-input p-3 rounded-lg mb-2 text-sm">
                    <input id="gh-repo" type="text" placeholder="Nama Repo" class="w-full admin-input p-3 rounded-lg mb-2 text-sm">
                </div>
                <div class="glass rounded-xl p-4">
                    <h3 class="font-bold mb-3">Setting Umum</h3>
                    <label class="block mb-2 text-sm">Status Toko</label>
                    <div class="flex gap-2 mb-3">
                        <button onclick="setToko(true)" id="btn-buka" class="flex-1 bg-slate-800 py-2.5 rounded-lg font-bold admin-btn">🟢 BUKA</button>
                        <button onclick="setToko(false)" id="btn-tutup" class="flex-1 bg-slate-800 py-2.5 rounded-lg font-bold admin-btn">🔴 TUTUP</button>
                    </div>
                    <label class="block mb-2 text-sm">Username Telegram CS</label>
                    <input id="username-tele" type="text" placeholder="jyliestoreid" class="w-full admin-input p-3 rounded-lg text-sm">
                </div>
                <button onclick="simpanSemua()" class="w-full bg-green-500 text-slate-900 py-4 rounded-xl font-extrabold text-lg admin-btn">💾 Simpan Semua</button>
            </section>

            <p id="notif" class="text-center text-sm mt-3 font-bold h-5"></p>
        </main>
    </div>

<script>
const CONFIG = { USER: "ownerjylie", PASS: "jylie547" };
let db = { username_tele: '', toko_buka: true, games: [] };

function notif(msg, sukses = true) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.className = sukses? 'notif-sukses' : 'notif-gagal';
  setTimeout(() => el.textContent = '', 3000);
}

function showSection(id, btn) {
  document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
  document.getElementById('section-' + id).classList.remove('hidden');
  document.querySelectorAll('.menu-tab').forEach(b => {
    b.classList.remove('menu-active');
    b.classList.add('bg-slate-800');
  });
  btn.classList.add('menu-active');
  btn.classList.remove('bg-slate-800');
}

function login() {
  const loginMsg = document.getElementById('loginMsg');
  const user = document.getElementById('user').value;
  const pass = document.getElementById('pass').value;
  if(user!== CONFIG.USER || pass!== CONFIG.PASS) {
    loginMsg.innerText = 'Username atau Password salah!';
    return;
  }
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('adminBox').style.display = 'block';
  loadData();
  loadLocalSettings();
  loadOrders();
}

function logout() {
  document.getElementById('adminBox').style.display = 'none';
  document.getElementById('loginBox').style.display = 'flex';
  document.getElementById('user').value = '';
  document.getElementById('pass').value = '';
  document.getElementById('loginMsg').innerText = '';
}

function loadLocalSettings() {
  document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
  document.getElementById('gh-user').value = localStorage.getItem('gh_user') || '';
  document.getElementById('gh-repo').value = localStorage.getItem('gh_repo') || '';
}

function setToko(status) {
  db.toko_buka = status;
  document.getElementById('btn-buka').className = status? 'flex-1 bg-green-600/30 ring-2 ring-green-400 py-2.5 rounded-lg font-bold' : 'flex-1 bg-slate-800 py-2.5 rounded-lg font-bold admin-btn';
  document.getElementById('btn-tutup').className =!status? 'flex-1 bg-red-600/30 ring-2 ring-red-400 py-2.5 rounded-lg font-bold' : 'flex-1 bg-slate-800 py-2.5 rounded-lg font-bold admin-btn';
  document.getElementById('status-toko').innerText = status? 'BUKA' : 'TUTUP';
  document.getElementById('status-toko').className = status? 'text-2xl font-extrabold mt-1 text-green-400' : 'text-2xl font-extrabold mt-1 text-red-400';
  notif(status? 'Toko di-SET BUKA' : 'Toko di-SET TUTUP. Jangan lupa Simpan!');
}

async function loadData() {
  try {
    const res = await fetch('db.json?' + Date.now());
    db = await res.json();
    document.getElementById('username-tele').value = db.username_tele || '';
    setToko(db.toko_buka!== false);
    renderProduk();
  } catch (e) {
    db = { username_tele: 'jyliestoreid', toko_buka: true, games: [] };
    notif('Gagal load db.json, bikin baru', false);
    setToko(true);
    renderProduk();
  }
}

function renderProduk() {
  const wrap = document.getElementById('produkList');
  wrap.innerHTML = '';
  if (db.games.length === 0) {
    wrap.innerHTML = '<div class="glass rounded-xl p-6 text-center text-slate-400">Belum ada game</div>';
    return;
  }
  db.games.forEach((game, gameIndex) => {
    const gameDiv = document.createElement('div');
    gameDiv.className = 'glass rounded-xl p-4';
    gameDiv.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div class="flex items-center gap-3">
          <img src="${game.icon}" class="w-10 h-10 rounded-lg object-cover bg-slate-800">
          <div>
            <input value="${game.name}" onchange="updateGame(${gameIndex}, 'name', this.value)" class="font-bold bg-transparent text-white w-full">
            <p class="text-xs text-slate-400">ID: ${game.id}</p>
          </div>
        <button onclick="hapusGame(${gameIndex})" class="bg-red-500/20 text-red-400 px-3 py-2 rounded-lg text-xs">Hapus</button>
      </div>
      <input value="${game.icon}" onchange="updateGame(${gameIndex}, 'icon', this.value)" class="admin-input text-xs w-full p-2 rounded-lg mb-3" placeholder="Link Logo">
      <div id="nominal-${gameIndex}" class="space-y-2 mb-2"></div>
      <button onclick="tambahNominal(${gameIndex})" class="w-full bg-slate-800 py-2 rounded-lg text-sm">+ Tambah Nominal</button>
    `;
    wrap.appendChild(gameDiv);
    const nominalWrap = document.getElementById(`nominal-${gameIndex}`);
    game.products.forEach((item, itemIndex) => {
      const row = document.createElement('div');
      row.className = 'bg-slate-800/50 p-2 rounded-lg';
      row.innerHTML = `
        <div class="flex gap-2 items-center mb-2">
          <input value="${item.name}" onchange="updateNominal(${gameIndex}, ${itemIndex}, 'name', this.value)" class="flex-1 admin-input p-2 rounded text-xs" placeholder="Nama Item">
          <button onclick="hapusNominal(${gameIndex}, ${itemIndex})" class="bg-red-500/20 text-red-400 px-2 py-1.5 rounded text-xs">X</button>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <input value="${item.harga}" type="number" onchange="updateNominal(${gameIndex}, ${itemIndex}, 'harga', this.value)" class="admin-input p-2 rounded text-xs" placeholder="Harga">
          <input value="${item.harga_asli || ''}" type="number" onchange="updateNominal(${gameIndex}, ${itemIndex}, 'harga_asli', this.value)" class="admin-input p-2 rounded text-xs" placeholder="Harga Coret">
        </div>
      `;
      nominalWrap.appendChild(row);
    });
  });
}

function tambahGame() {
  const id = document.getElementById('newGameId').value.trim().toLowerCase().replace(/\s+/g, '');
  const name = document.getElementById('newGameName').value.trim();
  const icon = document.getElementById('newGameLogo').value.trim();
  if(!id ||!name ||!icon) return notif('ID, Nama & Logo wajib diisi', false);
  if(db.games.find(g => g.id === id)) return notif('ID Game udah ada', false);
  db.games.push({ id, name, icon, products: [] });
  document.getElementById('newGameId').value = '';
  document.getElementById('newGameName').value = '';
  document.getElementById('newGameLogo').value = '';
  renderProduk();
  notif('Game ditambah. Jangan lupa Simpan!');
}

function hapusGame(gameIndex) {
  if(!confirm(`Hapus game ${db.games[gameIndex].name}?`)) return;
  db.games.splice(gameIndex, 1);
  renderProduk();
  notif('Game dihapus. Jangan lupa Simpan!');
}

function tambahNominal(gameIndex) {
  const newId = 'item_' + Date.now();
  db.games[gameIndex].products.push({ id: newId, name: "Item Baru", harga: 10000 });
  renderProduk();
  notif('Nominal ditambah. Edit nama + harga, terus Simpan!');
}

function hapusNominal(gameIndex, itemIndex) {
  db.games[gameIndex].products.splice(itemIndex, 1);
  renderProduk();
  notif('Nominal dihapus. Jangan lupa Simpan!');
}

window.updateGame = (i, field, val) => { db.games[i][field] = val; }
window.updateNominal = (i, j, field, val) => {
  if (field === 'harga' || field === 'harga_asli') {
    val = parseInt(val) || 0;
    if (field === 'harga_asli' && val === 0) {
      delete db.games[i].products[j].harga_asli;
      return;
    }
  }
  db.games[i].products[j][field] = val;
}

async function simpanSemua() {
  const token = document.getElementById('gh-token').value;
  const user = document.getElementById('gh-user').value;
  const repo = document.getElementById('gh-repo').value;
  if (!token ||!user ||!repo) return notif('Isi Setting GitHub dulu!', false);
  localStorage.setItem('gh_token', token);
  localStorage.setItem('gh_user', user);
  localStorage.setItem('gh_repo', repo);
  notif('Menyimpan ke GitHub...', true);
  db.username_tele = document.getElementById('username-tele').value;
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2))));
  const apiUrl = `https://api.github.com/repos/${user}/${repo}/contents/db.json`;
  try {
    let fileSHA = null;
    const getRes = await fetch(apiUrl, { headers: { 'Authorization': `token ${token}` } });
    if (getRes.ok) fileSHA = (await getRes.json()).sha;
    const updateRes = await fetch(apiUrl, {
      method: 'PUT',
      headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'Update db.json dari Admin Panel', content: content, sha: fileSHA })
    });
    if (updateRes.ok) notif('✅ Sukses! Vercel auto-deploy 20 detik');
    else throw new Error((await updateRes.json()).message);
  } catch (error) {
    notif('❌ Gagal: ' + error.message, false);
  }
}

let ALL_ORDERS = [];
let CURRENT_FILTER = 'all';

async function loadOrders() {
    const listEl = document.getElementById('order-list');
    listEl.innerHTML = '<div class="text-center py-8 text-slate-400">Loading...</div>';
    try {
        const res = await fetch('./orders.json?' + Date.now());
        const data = await res.json();
        ALL_ORDERS = data.orders.reverse();
        document.getElementById('total-order').innerText = ALL_ORDERS.length;
        document.getElementById('total-proses').innerText = ALL_ORDERS.filter(o => o.status === 'Diproses').length;
        renderOrders();
    } catch(e) {
        listEl.innerHTML = '<div class="glass rounded-xl p-6 text-center text-red-400">Gagal load orders.json. Upload file {"orders":[]} dulu</div>';
    }
}

function filterOrder(status) {
    CURRENT_FILTER = status;
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('bg-cyan-500', 'text-slate-900');
        btn.classList.add('bg-slate-800');
    });
    event.target.classList.remove('bg-slate-800');
    event.target.classList.add('bg-cyan-500', 'text-slate-900');
    renderOrders();
}

function renderOrders() {
    const listEl = document.getElementById('order-list');
    let filtered = CURRENT_FILTER === 'all'? ALL_ORDERS : ALL_ORDERS.filter(o => o.status === CURRENT_FILTER);
    if (filtered.length === 0) {
        listEl.innerHTML = '<div class="glass rounded-xl p-6 text-center text-slate-400">Ga ada order</div>';
        return;
    }
    listEl.innerHTML = '';
    filtered.forEach((order) => {
        const isSelesai = order.status === 'Selesai';
        const div = document.createElement('div');
        div.className = `glass rounded-xl p-4 border-l-4 ${isSelesai? 'border-green-500' : 'border-yellow-500'}`;
        div.innerHTML = `
            <div class="flex justify-between items-start mb-2">
                <div>
                    <p class="font-bold">${order.kode}</p>
                    <p class="text-xs text-slate-400">${order.waktu}</p>
                </div>
                <span class="px-2 py-1 rounded-full text-xs font-bold ${isSelesai? 'bg-green-500/20 text-green-400' : 'bg-yellow-500/20 text-yellow-400'}">${order.status}</span>
            </div>
            <p class="text-sm font-semibold">${order.game} - ${order.item}</p>
            <p class="text-xs text-slate-400 mt-1">ID: ${order.playerId} | ${order.namaPengirim}</p>
            <p class="text-cyan-400 font-extrabold mt-2 text-lg">Rp${order.harga.toLocaleString('id-ID')}</p>
            ${!isSelesai? `<button onclick="selesaiOrder('${order.kode}')" class="w-full mt-3 bg-green-500 text-slate-900 py-2 rounded-lg font-bold text-sm">✓ Tandai Selesai</button>` : ''}
        `;
        listEl.appendChild(div);
    });
}

async function selesaiOrder(kode) {
    if (!confirm(`Yakin udah kirim diamond untuk ${kode}?`)) return;
    const token = document.getElementById('gh-token').value;
    const owner = document.getElementById('gh-user').value;
    const repo = document.getElementById('gh-repo').value;
    if (!token ||!owner ||!repo) return notif('Isi Setting GitHub dulu!', false);
    notif('Update status order...', true);
    try {
        const apiUrl = `https://api.github.com/repos/${owner
