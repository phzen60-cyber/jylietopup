<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>Admin Panel - Jylie Topup</title>
    <style>
        *{font-family:Arial,sans-serif;-webkit-tap-highlight-color:transparent;box-sizing:border-box;margin:0;padding:0}
        body{background:#0f172a;color:#fff}
        button{cursor:pointer;border:0}
        input{outline:none}
      .box{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;margin-bottom:16px}
      .btn{background:#06b6d4;color:#0f172a;padding:12px;border-radius:8px;font-weight:700;width:100%}
      .btn-green{background:#22c55e;color:#0f172a}
      .btn-red{background:#ef4444;color:#fff}
      .btn-gray{background:#475569;color:#fff}
      .input{width:100%;background:#334155;border:1px solid #475569;padding:12px;border-radius:8px;color:#fff;margin-bottom:8px}
      .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
      .grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="loginBox" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px">
        <div class="box" style="max-width:400px;width:100%">
            <h1 style="font-size:24px;font-weight:700;text-align:center;margin-bottom:24px">🔐 Admin Login</h1>
            <input id="user" class="input" type="text" placeholder="Username">
            <input id="pass" class="input" type="password" placeholder="Password">
            <button type="button" onclick="login()" class="btn">Login</button>
            <p id="loginMsg" style="color:#f87171;font-size:14px;text-align:center;margin-top:12px;height:20px"></p>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="adminBox" style="display:none">
        <div style="background:#1e293b;padding:16px;position:sticky;top:0;z-index:50">
            <div style="max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center">
                <h1 style="font-size:20px;font-weight:700">🎮 Admin JylieTopup</h1>
                <button type="button" onclick="logout()" class="btn-red" style="padding:8px 16px">Logout</button>
            </div>
        </div>

        <div style="max-width:1200px;margin:0 auto;padding:24px 16px">
            <!-- STATS -->
            <div class="grid2" style="margin-bottom:24px">
                <div class="box"><p style="color:#94a3b8;font-size:14px">Pendapatan</p><b style="font-size:24px;color:#4ade80" id="duit">Rp 0</b></div>
                <div class="box"><p style="color:#94a3b8;font-size:14px">Total Order</p><b style="font-size:24px;color:#22d3ee" id="total">0</b></div>
                <div class="box"><p style="color:#94a3b8;font-size:14px">Pending</p><b style="font-size:24px;color:#facc15" id="pending">0</b></div>
                <div class="box"><p style="color:#94a3b8;font-size:14px">Status Toko</p><b style="font-size:24px" id="sttoko">-</b></div>
            </div>

            <!-- SETTING GITHUB -->
            <div class="box" style="border:2px solid #eab308">
                <h2 style="font-size:18px;font-weight:700;margin-bottom:16px">⚙️ Setting GitHub - WAJIB ISI</h2>
                <div class="grid3">
                    <input id="gh-token" class="input" type="password" placeholder="Token: ghp_xxx">
                    <input id="gh-user" class="input" type="text" placeholder="Username: phzen60-cyber">
                    <input id="gh-repo" class="input" type="text" placeholder="Repo: jylietopup">
                </div>
            </div>

            <!-- SETTING UMUM -->
            <div class="box">
                <h2 style="font-size:18px;font-weight:700;margin-bottom:16px">⚙️ Setting Umum</h2>
                <label style="display:block;margin-bottom:8px;font-size:14px">Status Toko</label>
                <div style="display:flex;gap:12px;margin-bottom:16px">
                    <button type="button" onclick="setToko(true)" id="btn-buka" class="btn-gray" style="flex:1">🟢 BUKA</button>
                    <button type="button" onclick="setToko(false)" id="btn-tutup" class="btn-gray" style="flex:1">🔴 TUTUP</button>
                </div>
                <label style="display:block;margin-bottom:8px;font-size:14px">Username Telegram CS</label>
                <input id="username-tele" class="input" type="text" placeholder="jyliestoreid">
            </div>

            <!-- TAMBAH GAME -->
            <div class="box">
                <h2 style="font-size:18px;font-weight:700;margin-bottom:16px">🎮 Tambah Game Baru</h2>
                <div class="grid3" style="margin-bottom:12px">
                    <input id="newGameId" class="input" type="text" placeholder="ID: freefire">
                    <input id="newGameName" class="input" type="text" placeholder="Nama: Free Fire">
                    <input id="newGameLogo" class="input" type="text" placeholder="Link Logo">
                </div>
                <button type="button" onclick="tambahGame()" class="btn" style="background:#a855f7;color:#fff">+ Tambah Game</button>
            </div>

            <!-- LIST GAME -->
            <div class="box">
                <h2 style="font-size:18px;font-weight:700;margin-bottom:16px">📋 Kelola Game & Produk</h2>
                <div id="produkList">Loading...</div>
            </div>

            <!-- ORDER -->
            <div class="box">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                    <h2 style="font-size:18px;font-weight:700">📦 Kelola Order</h2>
                    <button type="button" onclick="loadOrders()" class="btn-gray" style="padding:8px 16px">🔄 Refresh</button>
                </div>
                <div style="display:flex;gap:8px;margin-bottom:16px">
                    <button type="button" onclick="filterOrder('all')" style="background:#06b6d4;color:#0f172a;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:700">Semua</button>
                    <button type="button" onclick="filterOrder('Diproses')" class="btn-gray" style="padding:8px 16px;font-size:14px">Diproses</button>
                    <button type="button" onclick="filterOrder('Selesai')" class="btn-gray" style="padding:8px 16px;font-size:14px">Selesai</button>
                </div>
                <div id="order-list" style="max-height:400px;overflow-y:auto">
                    <p style="color:#64748b;text-align:center;padding:32px 0">Klik Refresh buat load order</p>
                </div>
            </div>

            <!-- SIMPAN -->
            <button type="button" onclick="simpanSemua()" class="btn btn-green" style="padding:16px;font-size:18px">🔒 Simpan ke GitHub</button>
            <p id="notif" style="text-align:center;font-size:14px;margin-top:12px;height:20px"></p>
        </div>
    </div>

<script>
var CONFIG = { USER: "ownerjylie", PASS: "jylie547" };
var db = { username_tele: '', toko_buka: true, games: [] };
var ALL_ORDERS = [];
var CURRENT_FILTER = 'all';

function notif(msg, sukses) {
  var el = document.getElementById('notif');
  el.style.color = sukses===false? '#f87171' : '#4ade80';
  el.innerHTML = msg;
  setTimeout(function(){ el.innerHTML = '' }, 3000);
}

function login() {
  var user = document.getElementById('user').value.trim().toLowerCase();
  var pass = document.getElementById('pass').value.trim();
  var msg = document.getElementById('loginMsg');
  if(user === CONFIG.USER && pass === CONFIG.PASS) {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('adminBox').style.display = 'block';
    loadData();
    loadLocalSettings();
    setTimeout(loadOrders, 1000);
  } else {
    msg.innerHTML = 'Username/Password salah!';
  }
}

function logout() {
  document.getElementById('adminBox').style.display = 'none';
  document.getElementById('loginBox').style.display = 'flex';
  document.getElementById('user').value = '';
  document.getElementById('pass').value = '';
  document.getElementById('loginMsg').innerHTML = '';
}

function loadLocalSettings() {
  document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
  document.getElementById('gh-user').value = localStorage.getItem('gh_user') || '';
  document.getElementById('gh-repo').value = localStorage.getItem('gh_repo') || '';
}

function setToko(status) {
  db.toko_buka = status;
  document.getElementById('btn-buka').style.background = status? '#16a34a' : '#475569';
  document.getElementById('btn-tutup').style.background =!status? '#dc2626' : '#475569';
  document.getElementById('sttoko').innerHTML = status? '<span style="color:#4ade80">BUKA</span>' : '<span style="color:#f87171">TUTUP</span>';
  notif(status? 'Toko dibuka' : 'Toko ditutup');
}

function loadData() {
  fetch('db.json?' + Date.now()).then(function(res){
    return res.json();
  }).then(function(data){
    db = data;
    document.getElementById('username-tele').value = db.username_tele || '';
    setToko(db.toko_buka!== false);
    renderProduk();
  }).catch(function(e){
    db = { username_tele: 'jyliestoreid', toko_buka: true, games: [] };
    notif('Gagal load db.json, bikin baru', false);
    setToko(true);
    renderProduk();
  });
}

function renderProduk() {
  var wrap = document.getElementById('produkList');
  wrap.innerHTML = '';
  if (db.games.length === 0) {
    wrap.innerHTML = '<p style="color:#94a3b8;text-align:center;padding:32px 0">Belum ada game. Tambah di atas.</p>';
    return;
  }
  for(var i=0;i<db.games.length;i++){
    var game = db.games[i];
    var html = '<div style="background:#334155;border:1px solid #475569;border-radius:12px;padding:16px;margin-bottom:16px">'+
      '<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:16px">'+
        '<div style="display:flex;align-items:center;gap:16px">'+
          '<img src="'+game.icon+'" style="width:56px;height:56px;border-radius:12px;object-fit:cover;background:#475569">'+
          '<div>'+
            '<input value="'+game.name+'" onchange="updateGame('+i+',\'name\',this.value)" style="font-weight:700;background:transparent;color:#fff;font-size:18px;border:0;outline:none">'+
            '<p style="color:#94a3b8;font-size:12px;margin-top:4px">ID: '+game.id+'</p>'+
          '</div>'+
        '</div>'+
        '<button type="button" onclick="hapusGame('+i+')" style="background:#ef4444;color:#fff;padding:8px 12px;border-radius:8px">Hapus</button>'+
      '</div>'+
      '<input value="'+game.icon+'" onchange="updateGame('+i+',\'icon\',this.value)" class="input" placeholder="Link Logo Game">'+
      '<div id="nominal-'+i+'" style="margin:16px 0"></div>'+
      '<button type="button" onclick="tambahNominal('+i+')" class="btn-gray" style="width:100%">+ Tambah Nominal</button>'+
    '</div>';
    wrap.innerHTML += html;

    var nominalWrap = document.getElementById('nominal-'+i);
    for(var j=0;j<game.products.length;j++){
      var item = game.products[j];
      nominalWrap.innerHTML += '<div style="background:#1e293b;border:1px solid #475569;border-radius:8px;padding:12px;margin-bottom:8px">'+
        '<div style="display:flex;gap:8px;margin-bottom:8px">'+
          '<input value="'+item.name+'" onchange="updateNominal('+i+','+j+',\'name\',this.value)" class="input" style="flex:1;margin:0" placeholder="Nama Item">'+
          '<button type="button" onclick="hapusNominal('+i+','+j+')" style="background:#ef4444;color:#fff;padding:12px;border-radius:8px">X</button>'+
        '</div>'+
        '<div class="grid2">'+
          '<input value="'+item.harga+'" type="number" onchange="updateNominal('+i+','+j+',\'harga\',this.value)" class="input" style="margin:0" placeholder="Harga Jual">'+
          '<input value="'+(item.harga_asli||'')+'" type="number" onchange="updateNominal('+i+','+j+',\'harga_asli\',this.value)" class="input" style="margin:0" placeholder="Harga Asli">'+
        '</div>'+
      '</div>';
    }
  }
}

function tambahGame() {
  var id = document.getElementById('newGameId').value.trim().toLowerCase().replace(/\s+/g, '');
  var name = document.getElementById('newGameName').value.trim();
  var icon = document.getElementById('newGameLogo').value.trim();
  if(!id ||!name ||!icon) return notif('ID, Nama & Logo wajib diisi', false);
  for(var i=0;i<db.games.length;i++){ if(db.games[i].id === id) return notif('ID Game udah ada', false); }
  db.games.push({ id:id, name:name, icon:icon, products: [] });
  document.getElementById('newGameId').value = '';
  document.getElementById('newGameName').value = '';
  document.getElementById('newGameLogo').value = '';
  renderProduk();
  notif('Game ditambah. Jangan lupa Simpan!');
}

function hapusGame(i) {
  if(!confirm('Hapus game '+db.games[i].name+'?')) return;
  db.games.splice(i, 1);
  renderProduk();
  notif('Game dihapus. Jangan lupa Simpan!');
}

function tambahNominal(i) {
  db.games[i].products.push({ id: 'item_' + Date.now(), name: "Item Baru", harga: 10000 });
  renderProduk();
  notif('Nominal ditambah');
}

function hapusNominal(i, j) {
  db.games[i].products.splice(j, 1);
  renderProduk();
  notif('Nominal dihapus');
}

function updateGame(i, field, val) { db.games[i][field] = val; }
function updateNominal(i, j, field, val) {
  if (field === 'harga' || field === 'harga_asli') {
    val = parseInt(val) || 0;
    if (field === 'harga_asli' && val === 0) {
      delete db.games[i].products[j].harga_asli;
      return;
    }
  }
  db.games[i].products[j][field] = val;
}

function simpanSemua() {
  var token = document.getElementById('gh-token').value;
  var user = document.getElementById('gh-user').value;
  var repo = document.getElementById('gh-repo').value;
  if (!token ||!user ||!repo) return notif('Isi Setting GitHub dulu!', false);
  localStorage.setItem('gh_token', token);
  localStorage.setItem('gh_user', user);
  localStorage.setItem('gh_repo', repo);
  notif('Menyimpan ke GitHub...');
  db.username_tele = document.getElementById('username-tele').value;

  var content = btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2))));
  var apiUrl = 'https://api.github.com/repos/'+user+'/'+repo+'/contents/db.json';

  fetch(apiUrl, { headers: { 'Authorization': 'token '+token } }).then(function(getRes){
    return getRes.ok? getRes.json() : null;
  }).then(function(fileData){
    var body = { message: 'Update db.json dari Admin Panel', content: content };
    if(fileData && fileData.sha) body.sha = fileData.sha;
    return fetch(apiUrl, {
      method: 'PUT',
      headers: { 'Authorization': 'token '+token, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
  }).then(function(updateRes){
    if (updateRes.ok) {
      notif('✅ Sukses! Vercel auto-deploy 20 detik');
    } else {
      throw new Error('Gagal update');
    }
  }).catch(function(error){
    notif('❌ Gagal: ' + error.message, false);
  });
}

function loadOrders() {
  var listEl = document.getElementById('order-list');
  listEl.innerHTML = '<p style="color:#facc15;text-align:center;padding:32px 0">Loading...</p>';
  fetch('./orders.json?' + Date.now()).then(function(res){
    return res.json();
  }).then(function(data){
    ALL_ORDERS = data.orders.reverse();
    renderOrders();
    document.getElementById('total').textContent = ALL_ORDERS.length;
    var pending = 0; for(var i=0;i<ALL_ORDERS.length;i++){ if(ALL_ORDERS[i].status=='Diproses') pending++; }
    document.getElementById('pending').textContent = pending;
    var today = new Date().toISOString().split('T')[0];
    var duit = 0; for(var i=0;i<ALL_ORDERS.length;i++){ if(ALL_ORDERS[i].waktu.indexOf(today)===0 && ALL_ORDERS[i].status=='Selesai') duit+=ALL_ORDERS[i].harga; }
    document.getElementById('duit').textContent = 'Rp '+duit.toLocaleString('id-ID');
  }).catch(function(e){
    listEl.innerHTML = '<p style="color:#f87171;text-align:center;padding:32px 0">Gagal load orders.json</p>';
  });
}

function filterOrder(status) {
  CURRENT_FILTER = status;
  renderOrders();
}

function renderOrders() {
  var listEl = document.getElementById('order-list');
  var filtered = [];
  if(CURRENT_FILTER === 'all'){ filtered = ALL_ORDERS; }
  else { for(var i=0;i<ALL_ORDERS.length;i++){ if(ALL_ORDERS[i].status === CURRENT_FILTER) filtered.push(ALL_ORDERS[i]); } }

  if (filtered.length === 0) {
    listEl.innerHTML = '<p style="color:#64748b;text-align:center;padding:32px 0">Ga ada order</p>';
    return;
  }
  listEl.innerHTML = '';
  for(var i=0;i<filtered.length;i++){
    var order = filtered[i];
    var isSelesai = order.status === 'Selesai';
    var bgColor = isSelesai? '#16a34a' : '#eab308';
    var html = '<div style="background:#334155;border:1px solid #475569;border-radius:12px;padding:16px;margin-bottom:12px">'+
      '<div style="display:flex;justify-content:space-between;margin-bottom:12px">'+
        '<div><b style="font-size:18px">'+order.kode+'</b><p style="color:#94a3b8;font-size:12px">'+order.waktu+'</p></div>'+
        '<span style="background:'+bgColor+';color:#0f172a;padding:4px 12px;border-radius:9999px;font-size:12px;font-weight:700">'+order.status+'</span>'+
      '</div>'+
      '<p style="font-size:14px;margin-bottom:4px"><b>'+order.game+'</b> - '+order.item+'</p>'+
      '<p style="color:#94a3b8;font-size:14px">ID: <code style="background:#1e293b;padding:2px 8px;border-radius:6px">'+order.playerId+'</code></p>'+
      '<p style="color:#94a3b8;font-size:14px;margin-bottom:12px">'+order.namaPengirim+'</p>'+
      '<p style="color:#22d3ee;font-weight:700;font-size:24px;margin-bottom:12px">Rp'+order.harga.toLocaleString('id-ID')+'</p>'+
      (!isSelesai? '<button type="button" onclick="selesaiOrder(\''+order.kode+'\')" class="btn btn-green" style="width:100%">✓ Tandai Selesai</button>' : '')+
    '</div>';
    listEl.innerHTML += html;
  }
}

function selesaiOrder(kode) {
  if (!confirm('Yakin udah kirim diamond untuk '+kode+'?')) return;
  var token = document.getElementById('gh-token').value;
  var owner = document.getElementById('gh-user').value;
  var repo = document.getElementById('gh-repo').value;
  if (!token ||!owner ||!repo) return notif('Isi Setting GitHub dulu!', false);
  notif('Update status order...');

  var apiUrl = 'https://api.github.com/repos/'+owner+'/'+repo+'/contents/orders.json';
  fetch(apiUrl, { headers: { 'Authorization': 'token '+token } }).then(function(res){
    return res.json();
  }).then(function(file){
    var content = JSON.parse(decodeURIComponent(escape(atob(file.content))));
    var index = -1;
    for(var i=0;i<content.orders.length;i++){ if(content.orders[i].kode === kode){ index=i; break; } }
    if (index === -1) throw new Error('Order ga ketemu');
    content.orders[index].status = 'Selesai';
    return fetch(apiUrl, {
      method: 'PUT',
      headers: { 'Authorization': 'token '+token, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: 'Order '+kode+' selesai',
        content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
        sha: file.sha
      })
    });
  }).then(function(updateRes){
    if (updateRes.ok) {
      notif('✅ Status jadi Selesai!');
      loadOrders();
    } else {
      throw new Error('Gagal update');
    }
  }).catch(function(e){
    notif('❌ Error: ' + e.message, false);
  });
}
</script>
</body>
                </html>
