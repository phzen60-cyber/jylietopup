<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Jylie Topup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-white">

    <!-- LOGIN -->
    <div id="login-panel" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-slate-800 rounded-xl p-6 w-full max-w-sm">
            <h1 class="text-2xl font-bold text-center mb-6 text-cyan-400">🔐 Admin Login</h1>
            <input id="password" type="password" placeholder="Password Admin"
                   class="w-full bg-slate-700 p-3 rounded-lg mb-3 outline-none focus:ring-2 focus:ring-cyan-400">
            <button id="login-btn" class="w-full bg-cyan-500 hover:bg-cyan-600 text-slate-900 py-3 rounded-lg font-bold">Login</button>
            <p id="login-error" class="text-red-400 text-sm mt-3 text-center hidden">Password salah!</p>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="admin-panel" class="hidden">
        <header class="bg-slate-800 shadow-lg">
            <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                <h1 class="text-xl font-bold text-cyan-400">🎮 Admin Jylie</h1>
                <div class="text-xs text-slate-400">IP: <span id="user-ip">Loading...</span></div>
            </div>
        </header>

        <main class="container mx-auto px-4 py-8">
            <!-- SETTING GITHUB -->
            <div class="bg-slate-800 rounded-xl p-6 mb-6 border-2 border-yellow-500/50">
                <h2 class="text-xl font-bold mb-4 border-l-4 border-yellow-400 pl-3">Setting GitHub - WAJIB ISI</h2>
                <input id="gh-token" type="password" placeholder="GitHub Token"
                       class="w-full bg-slate-700 p-3 rounded-lg mb-2 outline-none focus:ring-2 focus:ring-cyan-400">
                <input id="gh-user" type="text" placeholder="Username GitHub"
                       class="w-full bg-slate-700 p-3 rounded-lg mb-2 outline-none focus:ring-2 focus:ring-cyan-400">
                <input id="gh-repo" type="text" placeholder="Nama Repo, contoh: jylie-topup"
                       class="w-full bg-slate-700 p-3 rounded-lg mb-2 outline-none focus:ring-2 focus:ring-cyan-400">
                <p class="text-xs text-slate-400">Token disimpan di browser lu doang. Aman.</p>
            </div>

            <div class="grid md:grid-cols-2 gap-6 mb-8">
                <!-- INFO TOKO -->
                <div class="bg-slate-800 rounded-xl p-6">
                    <h2 class="text-xl font-bold mb-4 border-l-4 border-cyan-400 pl-3">Setting Umum</h2>
                    <label class="block mb-2 text-sm font-semibold">Nomor WhatsApp CS</label>
                    <input id="nomor-wa" type="text" placeholder="628xxx"
                           class="w-full bg-slate-700 p-3 rounded-lg mb-3 outline-none focus:ring-2 focus:ring-cyan-400">

                    <label class="block mb-2 text-sm font-semibold">Link QRIS</label>
                    <input id="qris-url" type="text" placeholder="https://i.ibb.co/xxx/qris.jpg"
                           class="w-full bg-slate-700 p-3 rounded-lg mb-4 outline-none focus:ring-2 focus:ring-cyan-400">
                </div>

                <!-- TAMBAH GAME -->
                <div class="bg-slate-800 rounded-xl p-6">
                    <h2 class="text-xl font-bold mb-4 border-l-4 border-cyan-400 pl-3">Tambah Game Baru</h2>
                    <input id="game-id" type="text" placeholder="ID Game: freefire, mlbb"
                           class="w-full bg-slate-700 p-3 rounded-lg mb-2 outline-none focus:ring-2 focus:ring-cyan-400">
                    <input id="game-nama" type="text" placeholder="Nama Game: Free Fire"
                           class="w-full bg-slate-700 p-3 rounded-lg mb-2 outline-none focus:ring-2 focus:ring-cyan-400">
                    <input id="game-logo" type="text" placeholder="Link Logo Game"
                           class="w-full bg-slate-700 p-3 rounded-lg mb-3 outline-none focus:ring-2 focus:ring-cyan-400">
                    <button id="add-game" class="w-full bg-cyan-500 hover:bg-cyan-600 text-slate-900 py-3 rounded-lg font-bold">
                        + Tambah Game
                    </button>
                </div>
            </div>

            <!-- LIST GAME + PRODUK -->
            <div class="bg-slate-800 rounded-xl p-6">
                <h2 class="text-xl font-bold mb-4 border-l-4 border-cyan-400 pl-3">Kelola Produk</h2>
                <div id="game-list-admin" class="space-y-4">Loading...</div>
            </div>

            <!-- SIMPAN -->
            <button id="save-to-github" class="mt-6 w-full bg-green-500 hover:bg-green-600 py-4 rounded-lg font-bold text-lg disabled:bg-slate-600 disabled:cursor-not-allowed">
                🔒 Simpan Perubahan ke Vercel
            </button>
            <p id="status-save" class="text-center text-sm mt-3 text-slate-400"></p>
        </main>
    </div>

    <script>
        const ADMIN_PASS = 'jylie123'; // GANTI PASSWORD ADMIN LU
        let db = { nomor_wa: '', qris_url: '', produk: [] };
        let fileSHA = null;

        const loginPanel = document.getElementById('login-panel');
        const adminPanel = document.getElementById('admin-panel');
        const loginBtn = document.getElementById('login-btn');
        const passwordInput = document.getElementById('password');
        const loginError = document.getElementById('login-error');
        const statusSave = document.getElementById('status-save');
        const saveBtn = document.getElementById('save-to-github');

        fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => {
            document.getElementById('user-ip').textContent = d.ip;
        });

        loginBtn.addEventListener('click', () => {
            if (passwordInput.value === ADMIN_PASS) {
                loginPanel.classList.add('hidden');
                adminPanel.classList.remove('hidden');
                loadGitHubData();
                loadLocalSettings();
            } else {
                loginError.classList.remove('hidden');
            }
        });

        passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') loginBtn.click(); });

        function loadLocalSettings() {
            document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
            document.getElementById('gh-user').value = localStorage.getItem('gh_user') || '';
            document.getElementById('gh-repo').value = localStorage.getItem('gh_repo') || '';
        }

        async function loadGitHubData() {
            try {
                const res = await fetch('harga.json?v=' + Date.now());
                db = await res.json();
                renderAdmin();
            } catch (e) {
                db = { nomor_wa: '628123456789', qris_url: '', produk: [] };
                renderAdmin();
            }
        }

        function renderAdmin() {
            document.getElementById('nomor-wa').value = db.nomor_wa || '';
            document.getElementById('qris-url').value = db.qris_url || '';
            renderGameList();
        }

        document.getElementById('add-game').addEventListener('click', () => {
            const id = document.getElementById('game-id').value.trim().toLowerCase().replace(/\s+/g, '');
            const nama = document.getElementById('game-nama').value.trim();
            const logo = document.getElementById('game-logo').value.trim();
            if (!id ||!nama ||!logo) return alert('Isi ID, nama & logo!');
            db.produk.push({ id, nama, logo, nominal: [] });
            document.getElementById('game-id').value = '';
            document.getElementById('game-nama').value = '';
            document.getElementById('game-logo').value = '';
            renderGameList();
        });

        function renderGameList() {
            const container = document.getElementById('game-list-admin');
            if (db.produk.length === 0) {
                container.innerHTML = '<p class="text-slate-400 text-center">Belum ada game. Tambah di atas.</p>';
                return;
            }
            container.innerHTML = '';
            db.produk.forEach((game, gameIndex) => {
                const gameDiv = document.createElement('div');
                gameDiv.className = 'bg-slate-700 rounded-lg p-4';
                gameDiv.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-center gap-3">
                            <img src="${game.logo}" class="w-10 h-10 rounded object-cover bg-slate-600">
                            <div>
                                <input value="${game.nama}" onchange="updateGame(${gameIndex}, 'nama', this.value)" class="font-bold bg-transparent">
                                <p class="text-xs text-slate-400">ID: ${game.id}</p>
                            </div>
                        </div>
                        <button onclick="deleteGame(${gameIndex})" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-sm">Hapus</button>
                    </div>
                    <div class="space-y-2 mb-3">
                        ${game.nominal.map((item, itemIndex) => `
                            <div class="bg-slate-600 p-2 rounded">
                                <div class="flex gap-2 items-center mb-2">
                                    <input value="${item.name}" onchange="updateNominal(${gameIndex}, ${itemIndex}, 'name', this.value)"
                                           class="flex-1 bg-slate-800 p-2 rounded text-sm" placeholder="Nama Item">
                                    <button onclick="deleteNominal(${gameIndex}, ${itemIndex})" class="bg-red-500 px-2 py-2 rounded text-sm">X</button>
                                </div>
                                <div class="flex gap-2 items-center">
                                    <input value="${item.harga}" type="number" onchange="updateNominal(${gameIndex}, ${itemIndex}, 'harga', this.value)"
                                           class="w-1/2 bg-slate-800 p-2 rounded text-sm" placeholder="Harga Jual">
                                    <input value="${item.harga_asli || ''}" type="number" onchange="updateNominal(${gameIndex}, ${itemIndex}, 'harga_asli', this.value)"
                                           class="w-1/2 bg-slate-800 p-2 rounded text-sm" placeholder="Harga Asli (diskon)">
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="addNominal(${gameIndex})" class="w-full bg-slate-600 hover:bg-slate-500 py-2 rounded text-sm">
                        + Tambah Nominal
                    </button>
                `;
                container.appendChild(gameDiv);
            });
        }

        window.addNominal = (i) => { db.produk[i].nominal.push({ name: 'Item Baru', harga: 10000 }); renderGameList(); }
        window.deleteNominal = (i, j) => { db.produk[i].nominal.splice(j, 1); renderGameList(); }
        window.deleteGame = (i) => { if (confirm('Hapus game ini?')) { db.produk.splice(i, 1); renderGameList(); } }
        window.updateGame = (i, field, val) => { db.produk[i][field] = val; }
        window.updateNominal = (i, j, field, val) => {
            if (field === 'harga' || field === 'harga_asli') {
                val = parseInt(val) || 0;
                if (field === 'harga_asli' && val === 0) {
                    delete db.produk[i].nominal[j].harga_asli;
                    return;
                }
            }
            db.produk[i].nominal[j][field] = val;
        }

        saveBtn.addEventListener('click', async () => {
            const token = document.getElementById('gh-token').value;
            const user = document.getElementById('gh-user').value;
            const repo = document.getElementById('gh-repo').value;

            if (!token ||!user ||!repo) {
                alert('Isi Setting GitHub dulu di atas!');
                return;
            }

            localStorage.setItem('gh_token', token);
            localStorage.setItem('gh_user', user);
            localStorage.setItem('gh_repo', repo);

            saveBtn.disabled = true;
            statusSave.textContent = 'Menyimpan ke GitHub...';
            statusSave.className = 'text-center text-sm mt-3 text-yellow-400';

            db.nomor_wa = document.getElementById('nomor-wa').value;
            db.qris_url = document.getElementById('qris-url').value;

            const content = btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2))));
            const apiUrl = `https://api.github.com/repos/${user}/${repo}/contents/harga.json`;

            try {
                const getRes = await fetch(apiUrl, { headers: { 'Authorization': `token ${token}` } });
                if (getRes.ok) {
                    const fileData = await getRes.json();
                    fileSHA = fileData.sha;
                }

                const updateRes = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: 'Update harga.json dari Admin Panel',
                        content: content,
                        sha: fileSHA
                    })
                });

                if (updateRes.ok) {
                    statusSave.textContent = '✅ Sukses! Vercel bakal auto-deploy dalam 20 detik.';
                    statusSave.className = 'text-center text-sm mt-3 text-green-400';
                } else {
                    const err = await updateRes.json();
                    throw new Error(err.message);
                }
            } catch (error) {
                statusSave.textContent = '❌ Gagal: ' + error.message;
                statusSave.className = 'text-center text-sm mt-3 text-red-400';
            } finally {
                saveBtn.disabled = false;
            }
        });
    </script>
</body>
    </html>
