<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>Admin Panel - Jylie Topup</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        *{font-family:'Poppins',sans-serif;-webkit-tap-highlight-color:transparent;box-sizing:border-box;margin:0;padding:0}
        body{background:#0f172a;color:#fff;position:relative;z-index:1}
      .glass{background:rgba(30,41,59,0.8);backdrop-filter:blur(12px);border:1px solid rgba(51,65,85,0.5)}
      button{cursor:pointer;border:0;position:relative;z-index:9999!important;pointer-events:auto!important}
      input{position:relative;z-index:9999!important;pointer-events:auto!important}
      .admin-btn:active{transform:scale(.97)}
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="loginBox" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);position:relative;z-index:10">
        <div class="glass" style="border-radius:16px;padding:32px;width:100%;max-width:384px">
            <div style="text-align:center;margin-bottom:32px">
                <div style="width:64px;height:64px;background:linear-gradient(135deg,#22d3ee 0%,#3b82f6 100%);border-radius:16px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="#0f172a"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
                </div>
                <h1 style="font-size:24px;font-weight:700">Admin JylieTopup</h1>
                <p style="color:#94a3b8;font-size:14px;margin-top:4px">Masuk ke dashboard</p>
            </div>
            <div style="display:flex;flex-direction:column;gap:16px">
                <input id="user" type="text" placeholder="Username" style="width:100%;background:rgba(51,65,85,0.5);border:1px solid #475569;padding:12px 12px 12px 40px;border-radius:12px;outline:none;color:#fff">
                <input id="pass" type="password" placeholder="Password" style="width:100%;background:rgba(51,65,85,0.5);border:1px solid #475569;padding:12px 12px 40px;border-radius:12px;outline:none;color:#fff">
                <button type="button" onclick="cekLogin()" style="width:100%;background:linear-gradient(90deg,#06b6d4 0%,#3b82f6 100%);color:#0f172a;padding:12px;border-radius:12px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px">
                    Login
                </button>
                <p id="loginMsg" style="color:#f87171;font-size:14px;text-align:center;height:20px"></p>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="adminBox" style="display:none">
        <div style="padding:32px;text-align:center">
            <h1 style="font-size:32px;font-weight:700;color:#4ade80">LOGIN BERHASIL BRO! 🔥</h1>
            <p style="color:#94a3b8;margin-top:8px">Tombol bisa di-klik kan? Kalo ini muncul berarti dah bener.</p>
            <button type="button" onclick="logout()" style="margin-top:24px;background:#ef4444;color:#fff;padding:12px 24px;border-radius:12px;font-weight:700">Logout Test</button>
        </div>
    </div>

<script>
// DEBUG: PASTIIN JS JALAN
alert('JS NYALA BRO ✅\n\nKalo popup ini muncul, tombol login pasti bisa di-klik.\n\nKlik OK terus coba login.');

function cekLogin() {
  alert('TOMBOL KE-KLIK! Function jalan!');
  var user = document.getElementById('user').value.trim().toLowerCase();
  var pass = document.getElementById('pass').value.trim();
  var msg = document.getElementById('loginMsg');
  
  if(user === 'ownerjylie' && pass === 'jylie547') {
    alert('LOGIN SUKSES BRO!');
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('adminBox').style.display = 'block';
  } else {
    msg.innerHTML = 'Username/Password salah! Kamu ketik: ' + user;
  }
}

function logout() {
  document.getElementById('adminBox').style.display = 'none';
  document.getElementById('loginBox').style.display = 'flex';
  document.getElementById('user').value = '';
  document.getElementById('pass').value = '';
  document.getElementById('loginMsg').innerHTML = '';
}
</script>
</body>
</html>
