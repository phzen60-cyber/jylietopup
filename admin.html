<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Jylie Topup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        .admin-btn { transition: 0.2s; }
        .admin-btn:hover { transform: scale(1.02); }
        .admin-input { background: #334155; }
        .admin-input:focus { outline: 2px solid #06b6d4; }
        .notif-sukses { color: #4ade80; }
        .notif-gagal { color: #f87171; }
    </style>
</head>
<body class="bg-slate-900 text-white">

    <!-- LOGIN -->
    <div id="loginBox" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-slate-800 rounded-xl p-6 w-full max-w-sm">
            <h1 class="text-2xl font-bold text-center mb-6 text-cyan-400">🔐 Admin Login</h1>
            <p class="text-xs text-center mb-4 text-slate-400">IP Lu: <span id="ipText">Loading...</span></p>
            <input id="user" type="text" placeholder="Username"
                   class="w-full bg-slate-700 p-3 rounded-lg mb-3 outline-none focus:ring-2 focus:ring-cyan-400">
            <input id="pass" type="password" placeholder="Password"
                   class="w-full bg-slate-700 p-3 rounded-lg mb-3 outline-none focus:ring-2 focus:ring-cyan-400">
            <button onclick="login()" class="w-full bg-cyan-500 hover:bg-cyan-600 text-slate-900 py-3 rounded-lg font-bold admin-btn">Login</button>
            <p id="loginMsg" class="text-red-400 text-sm mt-3 text-center"></p>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="adminBox" class="hidden">
        <header class="bg-slate-800 shadow-lg sticky top-0 z-10">
            <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                <h1 class="text-xl font-bold text-cyan-400">🎮 Admin Jylie</h1>
                <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg text-sm admin-btn">Logout</button>
            </div>
        </header>

        <main class="container mx-auto px-4 py-8">
            <!-- SETTING GITHUB -->
            <div class="bg-slate-800 rounded-xl p-6 mb-6 border-2 border-yellow-500/50">
                <h2 class="text-xl font-bold mb-4 border-l-4 border-yellow-400 pl-3">Setting GitHub - WAJIB ISI</h2>
                <input id="gh-token" type="password" placeholder="GitHub Token: ghp_xxx"
                       class="w-full admin-input p-3 rounded-lg mb-2">
                <input id="gh-user" type="text" placeholder="Username GitHub: ownerjylie"
                       class="w-full admin-input p-3 rounded-lg mb-2">
                <input id="gh-repo" type="text" placeholder="Nama Repo: jylie-topup"
                       class="w-full admin-input p-3 rounded-lg mb-2">
                <p class="text-xs text-slate-400">Token disimpan di browser lu doang. Aman.</p>
            </div>

            <!-- SETTING UMUM -->
            <div class="bg-slate-800 rounded-xl p-6 mb-6">
                <h2 class="text-xl font-bold mb-4 border-l-4 border-cyan-400 pl-3">Setting Umum</h2>
                
                <label class="block mb-2 text-sm font-semibold">Status Toko</label>
                <div class="flex gap-3 mb-4">
                    <button onclick="setToko(true)" id="btn-buka" class="flex-1 bg-slate-600 hover:bg-green-700 py-3 rounded-lg font-bold admin-btn">🟢 BUKA</button>
                    <button onclick="setToko(false)" id="btn-tutup" class="flex-1 bg-slate-600 hover:bg-red-700 py-3 rounded-lg font-bold admin-btn">🔴 TUTUP</button>
                </div>

                <label class="block mb-2 text-sm font-semibold">Nomor WhatsApp CS</label>
                <input id="nomor-wa" type="text" placeholder="62895336789308"
                       class="w-full admin-input p-3 rounded-lg mb-3">
            </div>

            <!-- TAMBAH GAME -->
            <div class="bg-slate-800 rounded-xl p-6 mb-6">
                <h2 class="text-xl font-bold mb-4 border-l-4 border-cyan-400 pl-3">Tambah Game Baru</h2>
                <input id="newGameId" type="text" placeholder="ID Game: freefire, mlbb, pubg"
                       class="w-full admin-input p-3 rounded-lg mb-2">
                <input id="newGameName" type="text" placeholder="Nama Game: Free Fire"
                       class="w-full admin-input p-3 rounded-lg mb-2">
                <input id="newGameLogo" type="text" placeholder="Link Logo: https://..."
                       class="w-full admin-input p-3 rounded-lg mb-3">
                <button onclick="tambahGame()" class="w-full bg-cyan-500 hover:bg-cyan-600 text-slate-900 py-3 rounded-lg font-bold admin-btn">
                    + Tambah Game
                </button>
            </div>

            <!-- LIST GAME + PRODUK -->
            <div class="bg-slate-800 rounded-xl p-6">
                <h2 class="text-xl font-bold mb-4 border-l-4 border-cyan-400 pl-3">Kelola Game & Produk</h2>
                <div id="produkList" class="space-y-4">Loading...</div>
            </div>

            <!-- SIMPAN -->
            <button onclick="simpanSemua()" class="mt-6 w-full bg-green-500 hover:bg-green-600 py-4 rounded-lg font-bold text-lg admin-btn">
                🔒 Simpan Perubahan ke GitHub
            </button>
            <p id="notif" class="text-center text-sm mt-3"></p>
        </main>
    </div>

<script>
const CONFIG = {
  USER: "ownerjylie",
  PASS: "jylie547",
  WHITELIST_IP: ["175.158.55.141"]
};

let db = { nomor_wa: '', toko_buka: true, produk: [] };

const notif = (msg, sukses = true) => {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.className = sukses? 'notif-sukses' : 'notif-gagal';
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
};

async function login() {
  const loginMsg = document.getElementById('loginMsg');
  loginMsg.innerText = "Cek IP...";

  try {
    const ipRes = await fetch('https://api.ipify.org?format=json');
    const ipData = await ipRes.json();
    const userIP = ipData.ip;
    document.getElementById('ipText').innerText = userIP;

    if (!CONFIG.WHITELIST_IP.includes(userIP)) {
      loginMsg.innerText = `Akses ditolak! IP ${userIP} ga terdaftar.`;
      return;
    }
  } catch(e) {
    loginMsg.innerText = 'Gagal cek IP. Coba refresh.';
    return;
  }

  const user = document.getElementById('user').value;
  const pass = document.getElementById('pass').value;

  if(user!== CONFIG.USER || pass!== CONFIG.PASS) {
    loginMsg.innerText = 'Username atau Password salah!';
    return;
  }

  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('adminBox').style.display = 'block';
  loadData();
  loadLocalSettings();
}

function logout() {
  document.getElementById('adminBox').style.display = 'none';
  document.getElementById('loginBox').style.display = 'flex';
  document.getElementById('user').value = '';
  document.getElementById('pass').value = '';
  document.getElementById('loginMsg').innerText = '';
}

function loadLocalSettings() {
  document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
  document.getElementById('gh-user').value = localStorage.getItem('gh_user') || '';
  document.getElementById('gh-repo').value = localStorage.getItem('gh_repo') || '';
}

function setToko(status) {
  db.toko_buka = status;
  document.getElementById('btn-buka').className = status ? 'flex-1 bg-green-600 ring-4 ring-green-400 py-3 rounded-lg font-bold admin-btn' : 'flex-1 bg-slate-600 hover:bg-green-700 py-3 rounded-lg font-bold admin-btn';
  document.getElementById('btn-tutup').className = !status ? 'flex-1 bg-red-600 ring-4 ring-red-400 py-3 rounded-lg font-bold admin-btn' : 'flex-1 bg-slate-600 hover:bg-red-700 py-3 rounded-lg font-bold admin-btn';
  notif(status ? 'Toko di-SET BUKA' : 'Toko di-SET TUTUP. Jangan lupa Simpan!');
}

async function loadData() {
  try {
    const res = await fetch('harga.json?' + Date.now());
    db = await res.json();
    document.getElementById('nomor-wa').value = db.nomor_wa || '';
    setToko(db.toko_buka !== false);
    renderProduk();
  } catch (e) {
    db = { nomor_wa: '62895336789308', toko_buka: true, produk: [] };
    notif('Gagal load harga.json, bikin baru', false);
    setToko(true);
    renderProduk();
  }
}

function renderProduk() {
  const wrap = document.getElementById('produkList');
  wrap.innerHTML = '';

  if (db.produk.length === 0) {
    wrap.innerHTML = '<p class="text-slate-400 text-center">Belum ada game. Tambah di atas.</p>';
    return;
  }

  db.produk.forEach((game, gameIndex) => {
    const gameDiv = document.createElement('div');
    gameDiv.className = 'bg-slate-700 rounded-lg p-4';
    gameDiv.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div class="flex items-center gap-3">
          <img src="${game.logo}" class="w-10 h-10 rounded object-cover bg-slate-600">
          <div>
            <input value="${game.nama}" onchange="updateGame(${gameIndex}, 'nama', this.value)" 
                   class="font-bold bg-transparent text-white">
            <p class="text-xs text-slate-400">ID: ${game.id}</p>
          </div>
        </div>
        <button onclick="hapusGame(${gameIndex})" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-sm admin-btn">Hapus</button>
      </div>
      <div class="ml-4 mb-3">
        <input value="${game.logo}" onchange="updateGame(${gameIndex}, 'logo', this.value)"
               class="admin-input text-xs w-full p-2 rounded" placeholder="Link Logo Game">
      </div>
      <div id="nominal-${gameIndex}" class="space-y-2 mb-3"></div>
      <button onclick="tambahNominal(${gameIndex})" class="w-full bg-slate-600 hover:bg-slate-500 py-2 rounded text-sm admin-btn">
        + Tambah Nominal
      </button>
    `;
    wrap.appendChild(gameDiv);

    const nominalWrap = document.getElementById(`nominal-${gameIndex}`);
    game.nominal.forEach((item, itemIndex) => {
      const row = document.createElement('div');
      row.className = 'bg-slate-600 p-2 rounded';
      row.innerHTML = `
        <div class="flex gap-2 items-center mb-2">
          <input value="${item.name}" onchange="updateNominal(${gameIndex}, ${itemIndex}, 'name', this.value)"
                 class="flex-1 admin-input p-2 rounded text-sm" placeholder="Nama Item">
          <button onclick="hapusNominal(${gameIndex}, ${itemIndex})" class="bg-red-500 px-2 py-2 rounded text-sm admin-btn">X</button>
        </div>
        <div class="flex gap-2 items-center">
          <input value="${item.harga}" type="number" onchange="updateNominal(${gameIndex}, ${itemIndex}, 'harga', this.value)"
                 class="w-1/2 admin-input p-2 rounded text-sm" placeholder="Harga Jual">
          <input value="${item.harga_asli || ''}" type="number" onchange="updateNominal(${gameIndex}, ${itemIndex}, 'harga_asli', this.value)"
                 class="w-1/2 admin-input p-2 rounded text-sm" placeholder="Harga Asli">
        </div>
      `;
      nominalWrap.appendChild(row);
    });
  });
}

function tambahGame() {
  const id = document.getElementById('newGameId').value.trim().toLowerCase().replace(/\s+/g, '');
  const nama = document.getElementById('newGameName').value.trim();
  const logo = document.getElementById('newGameLogo').value.trim();
  if(!id ||!nama ||!logo) return notif('ID, Nama & Logo wajib diisi', false);
  if(db.produk.find(g => g.id === id)) return notif('ID Game udah ada', false);

  db.produk.push({ id, nama, logo, nominal: [] });
  document.getElementById('newGameId').value = '';
  document.getElementById('newGameName').value = '';
  document.getElementById('newGameLogo').value = '';
  renderProduk();
  notif('Game ditambah. Jangan lupa Simpan!');
}

function hapusGame(gameIndex) {
  if(!confirm(`Hapus game ${db.produk[gameIndex].nama}?`)) return;
  db.produk.splice(gameIndex, 1);
  renderProduk();
  notif('Game dihapus. Jangan lupa Simpan!');
}

function tambahNominal(gameIndex) {
  db.produk[gameIndex].nominal.push({ name: "Item Baru", harga: 10000 });
  renderProduk();
  notif('Nominal ditambah. Edit nama + harga, terus Simpan!');
}

function hapusNominal(gameIndex, itemIndex) {
  db.produk[gameIndex].nominal.splice(itemIndex, 1);
  renderProduk();
  notif('Nominal dihapus. Jangan lupa Simpan!');
}

window.updateGame = (i, field, val) => { db.produk[i][field] = val; }
window.updateNominal = (i, j, field, val) => {
  if (field === 'harga' || field === 'harga_asli') {
    val = parseInt(val) || 0;
    if (field === 'harga_asli' && val === 0) {
      delete db.produk[i].nominal[j].harga_asli;
      return;
    }
  }
  db.produk[i].nominal[j][field] = val;
}

async function simpanSemua() {
  const token = document.getElementById('gh-token').value;
  const user = document.getElementById('gh-user').value;
  const repo = document.getElementById('gh-repo').value;

  if (!token ||!user ||!repo) {
    notif('Isi Setting GitHub dulu di atas!', false);
    return;
  }

  localStorage.setItem('gh_token', token);
  localStorage.setItem('gh_user', user);
  localStorage.setItem('gh_repo', repo);

  notif('Menyimpan ke GitHub...', true);
  db.nomor_wa = document.getElementById('nomor-wa').value;

  const content = btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2))));
  const apiUrl = `https://api.github.com/repos/${user}/${repo}/contents/harga.json`;

  try {
    let fileSHA = null;
    const getRes = await fetch(apiUrl, { headers: { 'Authorization': `token ${token}` } });
    if (getRes.ok) {
      const fileData = await getRes.json();
      fileSHA = fileData.sha;
    }

    const updateRes = await fetch(apiUrl, {
      method: 'PUT',
      headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: 'Update harga.json dari Admin Panel',
        content: content,
        sha: fileSHA
      })
    });

    if (updateRes.ok) {
      notif('✅ Sukses! Vercel auto-deploy 20 detik');
    } else {
      const err = await updateRes.json();
      throw new Error(err.message);
    }
  } catch (error) {
    notif('❌ Gagal: ' + error.message, false);
  }
}
</script>
</body>
    </html>
