<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Jylie Topup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
       .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
       .admin-btn { transition: all 0.2s ease; }
       .admin-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(6, 182, 212, 0.3); }
       .admin-input { background: #1e293b; border: 1px solid #334155; }
       .admin-input:focus { outline: none; border-color: #06b6d4; box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.2); }
       .notif-sukses { color: #4ade80; }
       .notif-gagal { color: #f87171; }
       .menu-active { background: linear-gradient(90deg, #06b6d4, #0891b2); color: #0f172a; font-weight: 700; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-white">

    <!-- LOGIN -->
    <div id="loginBox" class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-950 via-slate-900 to-cyan-950">
        <div class="glass rounded-2xl p-8 w-full max-w-sm">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-cyan-500/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="shield-check" class="w-8 h-8 text-cyan-400"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-white">Admin Jylie</h1>
                <p class="text-slate-400 text-sm mt-1">Topup Dashboard</p>
            </div>
            <input id="user" type="text" placeholder="Username"
                   class="w-full admin-input p-3.5 rounded-xl mb-3 text-sm">
            <input id="pass" type="password" placeholder="Password"
                   class="w-full admin-input p-3.5 rounded-xl mb-4 text-sm">
            <button onclick="login()" class="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-900 py-3.5 rounded-xl font-bold admin-btn flex items-center justify-center gap-2">
                <i data-lucide="log-in" class="w-5 h-5"></i> Masuk
            </button>
            <p id="loginMsg" class="text-red-400 text-sm mt-4 text-center"></p>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="adminBox" class="hidden min-h-screen flex">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-slate-900 border-r border-slate-800 p-5 hidden md:block">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-10 h-10 bg-cyan-500/20 rounded-xl flex items-center justify-center">
                    <i data-lucide="gem" class="w-6 h-6 text-cyan-400"></i>
                </div>
                <h1 class="text-xl font-extrabold">Jylie Panel</h1>
            </div>
            <nav class="space-y-2">
                <button onclick="showSection('dashboard')" class="menu-btn menu-active w-full text-left px-4 py-3 rounded-xl flex items-center gap-3">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </button>
                <button onclick="showSection('game')" class="menu-btn w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 text-slate-300 hover:bg-slate-800">
                    <i data-lucide="gamepad-2" class="w-5 h-5"></i> Game & Produk
                </button>
                <button onclick="showSection('order')" class="menu-btn w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 text-slate-300 hover:bg-slate-800">
                    <i data-lucide="shopping-cart" class="w-5 h-5"></i> Kelola Order
                </button>
                <button onclick="showSection('setting')" class="menu-btn w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 text-slate-300 hover:bg-slate-800">
                    <i data-lucide="settings" class="w-5 h-5"></i> Setting
                </button>
            </nav>
            <div class="absolute bottom-5 left-5 right-5">
                <button onclick="logout()" class="w-full bg-red-500/10 hover:bg-red-500/20 text-red-400 py-3 rounded-xl font-bold flex items-center justify-center gap-2">
                    <i data-lucide="log-out" class="w-5 h-5"></i> Logout
                </button>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 p-4 md:p-8 overflow-y-auto">
            <!-- MOBILE HEADER -->
            <div class="md:hidden flex justify-between items-center mb-6">
                <h1 class="text-2xl font-extrabold">🎮 Admin Jylie</h1>
                <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded-lg text-sm">Logout</button>
            </div>

            <!-- SECTION: DASHBOARD -->
            <section id="section-dashboard" class="space-y-6">
                <h2 class="text-3xl font-extrabold">Dashboard</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                    <div class="glass rounded-2xl p-6">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-slate-400 text-sm">Total Order</p>
                                <p id="total-order" class="text-3xl font-extrabold mt-1">0</p>
                            </div>
                            <div class="w-12 h-12 bg-blue-500/20 rounded-xl flex items-center justify-center">
                                <i data-lucide="package" class="w-6 h-6 text-blue-400"></i>
                            </div>
                        </div>
                    <div class="glass rounded-2xl p-6">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-slate-400 text-sm">Order Diproses</p>
                                <p id="total-proses" class="text-3xl font-extrabold mt-1 text-yellow-400">0</p>
                            </div>
                            <div class="w-12 h-12 bg-yellow-500/20 rounded-xl flex items-center justify-center">
                                <i data-lucide="clock" class="w-6 h-6 text-yellow-400"></i>
                            </div>
                        </div>
                    </div>
                    <div class="glass rounded-2xl p-6">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-slate-400 text-sm">Status Toko</p>
                                <p id="status-toko" class="text-3xl font-extrabold mt-1 text-green-400">BUKA</p>
                            </div>
                            <div class="w-12 h-12 bg-green-500/20 rounded-xl flex items-center justify-center">
                                <i data-lucide="store" class="w-6 h-6 text-green-400"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- SECTION: GAME -->
            <section id="section-game" class="hidden space-y-6">
                <h2 class="text-3xl font-extrabold">Kelola Game & Produk</h2>
                <div class="glass rounded-2xl p-6">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2"><i data-lucide="plus-circle" class="w-5 h-5 text-cyan-400"></i> Tambah Game Baru</h3>
                    <div class="grid md:grid-cols-3 gap-3">
                        <input id="newGameId" type="text" placeholder="ID: freefire" class="admin-input p-3 rounded-xl text-sm">
                        <input id="newGameName" type="text" placeholder="Nama: Free Fire" class="admin-input p-3 rounded-xl text-sm">
                        <input id="newGameLogo" type="text" placeholder="Link Logo" class="admin-input p-3 rounded-xl text-sm">
                    </div>
                    <button onclick="tambahGame()" class="mt-3 w-full bg-cyan-500 hover:bg-cyan-400 text-slate-900 py-3 rounded-xl font-bold admin-btn">+ Tambah Game</button>
                </div>
                <div id="produkList" class="space-y-4"></div>
            </section>

            <!-- SECTION: ORDER -->
            <section id="section-order" class="hidden space-y-6">
                <div class="flex justify-between items-center">
                    <h2 class="text-3xl font-extrabold">Kelola Order Masuk</h2>
                    <button onclick="loadOrders()" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-xl text-sm admin-btn flex items-center gap-2">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i> Refresh
                    </button>
                </div>
                <div class="flex gap-2">
                    <button onclick="filterOrder('all')" class="filter-btn bg-cyan-500 text-slate-900 px-4 py-2 rounded-xl text-sm font-bold">Semua</button>
                    <button onclick="filterOrder('Diproses')" class="filter-btn bg-slate-800 px-4 py-2 rounded-xl text-sm">Diproses</button>
                    <button onclick="filterOrder('Selesai')" class="filter-btn bg-slate-800 px-4 py-2 rounded-xl text-sm">Selesai</button>
                </div>
                <div id="order-list" class="grid md:grid-cols-2 gap-4"></div>
            </section>

            <!-- SECTION: SETTING -->
            <section id="section-setting" class="hidden space-y-6">
                <h2 class="text-3xl font-extrabold">Setting</h2>
                <div class="glass rounded-2xl p-6 border-2 border-yellow-500/30">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2"><i data-lucide="github" class="w-5 h-5 text-yellow-400"></i> GitHub - WAJIB ISI</h3>
                    <input id="gh-token" type="password" placeholder="GitHub Token: ghp_xxx" class="w-full admin-input p-3 rounded-xl mb-3 text-sm">
                    <input id="gh-user" type="text" placeholder="Username: phzen60-cyber" class="w-full admin-input p-3 rounded-xl mb-3 text-sm">
                    <input id="gh-repo" type="text" placeholder="Repo: jylietopup" class="w-full admin-input p-3 rounded-xl mb-3 text-sm">
                </div>
                <div class="glass rounded-2xl p-6">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2"><i data-lucide="wrench" class="w-5 h-5 text-cyan-400"></i> Setting Umum</h3>
                    <label class="block mb-2 text-sm font-semibold">Status Toko</label>
                    <div class="flex gap-3 mb-4">
                        <button onclick="setToko(true)" id="btn-buka" class="flex-1 bg-slate-800 hover:bg-green-600/30 py-3 rounded-xl font-bold admin-btn">🟢 BUKA</button>
                        <button onclick="setToko(false)" id="btn-tutup" class="flex-1 bg-slate-800 hover:bg-red-600/30 py-3 rounded-xl font-bold admin-btn">🔴 TUTUP</button>
                    </div>
                    <label class="block mb-2 text-sm font-semibold">Username Telegram CS</label>
                    <input id="username-tele" type="text" placeholder="jyliestoreid" class="w-full admin-input p-3 rounded-xl text-sm">
                </div>
                <button onclick="simpanSemua()" class="w-full bg-green-500 hover:bg-green-400 text-slate-900 py-4 rounded-xl font-extrabold text-lg admin-btn flex items-center justify-center gap-2">
                    <i data-lucide="save" class="w-6 h-6"></i> Simpan Semua Perubahan
                </button>
            </section>

            <p id="notif" class="text-center text-sm mt-3 font-bold"></p>
        </main>
    </div>

<script>
lucide.createIcons();

const CONFIG = { USER: "ownerjylie", PASS: "jylie547" };
let db = { username_tele: '', toko_buka: true, games: [] };

const notif = (msg, sukses = true) => {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.className = sukses? 'notif-sukses' : 'notif-gagal';
  setTimeout(() => el.textContent = '', 3000);
};

function showSection(id) {
  document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
  document.getElementById('section-' + id).classList.remove('hidden');
  document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('menu-active'));
  event.target.closest('.menu-btn').classList.add('menu-active');
}

function login() {
  const loginMsg = document.getElementById('loginMsg');
  const user = document.getElementById('user').value;
  const pass = document.getElementById('pass').value;
  if(user!== CONFIG.USER || pass!== CONFIG.PASS) {
    loginMsg.innerText = 'Username atau Password salah!';
    return;
  }
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('adminBox').style.display = 'flex';
  loadData();
  loadLocalSettings();
  setTimeout(loadOrders, 1000);
}

function logout() {
  document.getElementById('adminBox').style.display = 'none';
  document.getElementById('loginBox').style.display = 'flex';
  document.getElementById('user').value = '';
  document.getElementById('pass').value = '';
  document.getElementById('loginMsg').innerText = '';
}

function loadLocalSettings() {
  document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
  document.getElementById('gh-user').value = localStorage.getItem('gh_user') || '';
  document.getElementById('gh-repo').value = localStorage.getItem('gh_repo') || '';
}

function setToko(status) {
  db.toko_buka = status;
  document.getElementById('btn-buka').className = status? 'flex-1 bg-green-600/30 ring-2 ring-green-400 py-3 rounded-xl font-bold' : 'flex-1 bg-slate-800 hover:bg-green-600/30 py-3 rounded-xl font-bold admin-btn';
  document.getElementById('btn-tutup').className =!status? 'flex-1 bg-red-600/30 ring-2 ring-red-400 py-3 rounded-xl font-bold' : 'flex-1 bg-slate-800 hover:bg-red-600/30 py-3 rounded-xl font-bold admin-btn';
  document.getElementById('status-toko').innerText = status? 'BUKA' : 'TUTUP';
  document.getElementById('status-toko').className = status? 'text-3xl font-extrabold mt-1 text-green-400' : 'text-3xl font-extrabold mt-1 text-red-400';
  notif(status? 'Toko di-SET BUKA' : 'Toko di-SET TUTUP. Jangan lupa Simpan!');
}

async function loadData() {
  try {
    const res = await fetch('db.json?' + Date.now());
    db = await res.json();
    document.getElementById('username-tele').value = db.username_tele || '';
    setToko(db.toko_buka!== false);
    renderProduk();
  } catch (e) {
    db = { username_tele: 'jyliestoreid', toko_buka: true, games: [] };
    notif('Gagal load db.json, bikin baru', false);
    setToko(true);
    renderProduk();
  }
}

function renderProduk() {
  const wrap = document.getElementById('produkList');
  wrap.innerHTML = '';
  if (db.games.length === 0) {
    wrap.innerHTML = '<div class="glass rounded-2xl p-8 text-center text-slate-400">Belum ada game. Tambah di atas.</div>';
    return;
  }
  db.games.forEach((game, gameIndex) => {
    const gameDiv = document.createElement('div');
    gameDiv.className = 'glass rounded-2xl p-5';
    gameDiv.innerHTML = `
      <div class="flex justify-between items-center mb-4">
        <div class="flex items-center gap-4">
          <img src="${game.icon}" class="w-12 h-12 rounded-xl object-cover bg-slate-800">
          <div>
            <input value="${game.name}" onchange="updateGame(${gameIndex}, 'name', this.value)"
                   class="font-bold text-lg bg-transparent text-white w-full">
            <p class="text-xs text-slate-400">ID: ${game.id}</p>
          </div>
        </div>
        <button onclick="hapusGame(${gameIndex})" class="bg-red-500/20 hover:bg-red-500/30 text-red-400 px-3 py-2 rounded-xl text-sm admin-btn"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
      </div>
      <input value="${game.icon}" onchange="updateGame(${gameIndex}, 'icon', this.value)"
             class="admin-input text-xs w-full p-2.5 rounded-xl mb-4" placeholder="Link Logo Game">
      <div id="nominal-${gameIndex}" class="space-y-2 mb-3"></div>
      <button onclick="tambahNominal(${gameIndex})" class="w-full bg-slate-800 hover:bg-slate-700 py-2.5 rounded-xl text-sm admin-btn flex items-center justify-center gap-2">
        <i data-lucide="plus" class="w-4 h-4"></i> Tambah Nominal
      </button>
    `;
    wrap.appendChild(gameDiv);
    const nominalWrap = document.getElementById(`nominal-${gameIndex}`);
    game.products.forEach((item, itemIndex) => {
      const row = document.createElement('div');
      row.className = 'bg-slate-800/50 p-3 rounded-xl';
      row.innerHTML = `
        <div class="flex gap-2 items-center mb-2">
          <input value="${item.name}" onchange="updateNominal(${gameIndex}, ${itemIndex}, 'name', this.value)"
                 class="flex-1 admin-input p-2 rounded-lg text-sm" placeholder="Nama Item">
          <button onclick="hapusNominal(${gameIndex}, ${itemIndex})" class="bg-red-500/20 text-red-400 px-2.5 py-2 rounded-lg text-sm admin-btn"><i data-lucide="x" class="w-4 h-4"></i></button>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <input value="${item.harga}" type="number" onchange="updateNominal(${gameIndex}, ${itemIndex}, 'harga', this.value)"
                 class="admin-input p-2 rounded-lg text-sm" placeholder="Harga Jual">
          <input value="${item.harga_asli || ''}" type="number" onchange="updateNominal(${gameIndex}, ${itemIndex}, 'harga_asli', this.value)"
                 class="admin-input p-2 rounded-lg text-sm" placeholder="Harga Coret">
        </div>
      `;
      nominalWrap.appendChild(row);
    });
  });
  lucide.createIcons();
}

function tambahGame() {
  const id = document.getElementById('newGameId').value.trim().toLowerCase().replace(/\s+/g, '');
  const name = document.getElementById('newGameName').value.trim();
  const icon = document.getElementById('newGameLogo').value.trim();
  if(!id ||!name ||!icon) return notif('ID, Nama & Logo wajib diisi', false);
  if(db.games.find(g => g.id === id)) return notif('ID Game udah ada', false);
  db.games.push({ id, name, icon, products: [] });
  document.getElementById('newGameId').value = '';
  document.getElementById('newGameName').value = '';
  document.getElementById('newGameLogo').value = '';
  renderProduk();
  notif('Game ditambah. Jangan lupa Simpan!');
}

function hapusGame(gameIndex) {
  if(!confirm(`Hapus game ${db.games[gameIndex].name}?`)) return;
  db.games.splice(gameIndex, 1);
  renderProduk();
  notif('Game dihapus. Jangan lupa Simpan!');
}

function tambahNominal(gameIndex) {
  const newId = 'item_' + Date.now();
  db.games[gameIndex].products.push({ id: newId, name: "Item Baru", harga: 10000 });
  renderProduk();
  notif('Nominal ditambah. Edit nama + harga, terus Simpan!');
}

function hapusNominal(gameIndex, itemIndex) {
  db.games[gameIndex].products.splice(itemIndex, 1);
  renderProduk();
  notif('Nominal dihapus. Jangan lupa Simpan!');
}

window.updateGame = (i, field, val) => { db.games[i][field] = val; }
window.updateNominal = (i, j, field, val) => {
  if (field === 'harga' || field === 'harga_asli') {
    val = parseInt(val) || 0;
    if (field === 'harga_asli' && val === 0) {
      delete db.games[i].products[j].harga_asli;
      return;
    }
  }
  db.games[i].products[j][field] = val;
}

async function simpanSemua() {
  const token = document.getElementById('gh-token').value;
  const user = document.getElementById('gh-user').value;
  const repo = document.getElementById('gh-repo').value;
  if (!token ||!user ||!repo) return notif('Isi Setting GitHub dulu!', false);
  localStorage.setItem('gh_token', token);
  localStorage.set
