<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>Admin Panel - Jylie Topup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        *{font-family:'Poppins',sans-serif;-webkit-tap-highlight-color:transparent}
        body{background:#0f172a}
      .glass{background:rgba(30,41,59,0.8);backdrop-filter:blur(12px);border:1px solid rgba(51,65,85,0.5)}
      .admin-btn{transition:all.2s}
      .admin-btn:active{transform:scale(.97)}
      .card-hover{transition:all.3s}
      .card-hover:hover{transform:translateY(-2px);box-shadow:0 20px 25px -5px rgba(0,0,0,0.3)}
      .toast{position:fixed;top:20px;right:20px;z-index:9999;animation:slideIn.3s}
        @keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
    </style>
</head>
<body class="text-white">

    <!-- LOGIN -->
    <div id="loginBox" class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
        <div class="glass rounded-2xl p-8 w-full max-w-sm card-hover">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-2xl mx-auto mb-4 flex items-center justify-center">
                    <i class="ri-shield-keyhole-fill text-3xl text-slate-900"></i>
                </div>
                <h1 class="text-2xl font-bold">Admin JylieTopup</h1>
                <p class="text-slate-400 text-sm mt-1">Masuk ke dashboard</p>
            </div>
            <div class="space-y-4">
                <div class="relative">
                    <i class="ri-user-line absolute left-3 top-3.5 text-slate-400"></i>
                    <input id="user" type="text" placeholder="Username" class="w-full bg-slate-700/50 border border-slate-600 p-3 pl-10 rounded-xl outline-none focus:ring-2 focus:ring-cyan-400 focus:border-transparent transition">
                </div>
                <div class="relative">
                    <i class="ri-lock-line absolute left-3 top-3.5 text-slate-400"></i>
                    <input id="pass" type="password" placeholder="Password" class="w-full bg-slate-700/50 border border-slate-600 p-3 pl-10 rounded-xl outline-none focus:ring-2 focus:ring-cyan-400 focus:border-transparent transition">
                </div>
                <button type="button" onclick="login()" class="w-full bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-600 hover:to-blue-600 text-slate-900 py-3 rounded-xl font-bold admin-btn flex items-center justify-center gap-2">
                    <i class="ri-login-box-line"></i> Login
                </button>
                <p id="loginMsg" class="text-red-400 text-sm text-center h-5"></p>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="adminBox" class="hidden">
        <header class="glass shadow-2xl sticky top-0 z-50">
            <div class="container mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-xl flex items-center justify-center">
                        <i class="ri-gamepad-line text-xl text-slate-900"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold">JylieTopup</h1>
                        <p class="text-xs text-slate-400">Admin Panel</p>
                    </div>
                <button type="button" onclick="logout()" class="bg-red-500/20 hover:bg-red-500/30 text-red-400 px-4 py-2 rounded-xl text-sm admin-btn flex items-center gap-2">
                    <i class="ri-logout-box-line"></i> Logout
                </button>
            </div>
        </header>

        <main class="container mx-auto px-4 py-8 max-w-6xl">
            <!-- STATS -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                <div class="glass rounded-2xl p-5 card-hover">
                    <div class="flex justify-between items-start mb-2">
                        <p class="text-slate-400 text-sm">Pendapatan</p>
                        <i class="ri-money-dollar-circle-line text-green-400 text-xl"></i>
                    </div>
                    <b class="text-2xl text-green-400" id="duit">Rp 0</b>
                </div>
                <div class="glass rounded-2xl p-5 card-hover">
                    <div class="flex justify-between items-start mb-2">
                        <p class="text-slate-400 text-sm">Total Order</p>
                        <i class="ri-shopping-bag-3-line text-cyan-400 text-xl"></i>
                    </div>
                    <b class="text-2xl text-cyan-400" id="total">0</b>
                </div>
                <div class="glass rounded-2xl p-5 card-hover">
                    <div class="flex justify-between items-start mb-2">
                        <p class="text-slate-400 text-sm">Pending</p>
                        <i class="ri-time-line text-yellow-400 text-xl"></i>
                    </div>
                    <b class="text-2xl text-yellow-400" id="pending">0</b>
                </div>
                <div class="glass rounded-2xl p-5 card-hover">
                    <div class="flex justify-between items-start mb-2">
                        <p class="text-slate-400 text-sm">Status Toko</p>
                        <i class="ri-store-2-line text-cyan-400 text-xl"></i>
                    </div>
                    <b class="text-2xl" id="sttoko">-</b>
                </div>
            </div>

            <!-- SETTING GITHUB -->
            <div class="glass rounded-2xl p-6 mb-6 card-hover border-2 border-yellow-500/30">
                <div class="flex items-center gap-3 mb-5">
                    <div class="w-12 h-12 bg-yellow-500/20 rounded-xl flex items-center justify-center">
                        <i class="ri-github-fill text-2xl text-yellow-400"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold">Setting GitHub</h2>
                        <p class="text-slate-400 text-sm">Wajib isi buat simpan data</p>
                    </div>
                <div class="grid md:grid-cols-3 gap-3">
                    <input id="gh-token" type="password" placeholder="Token: ghp_xxx" class="bg-slate-700/50 border border-slate-600 p-3 rounded-xl outline-none focus:ring-2 focus:ring-yellow-400">
                    <input id="gh-user" type="text" placeholder="Username: phzen60-cyber" class="bg-slate-700/50 border border-slate-600 p-3 rounded-xl outline-none focus:ring-2 focus:ring-yellow-400">
                    <input id="gh-repo" type="text" placeholder="Repo: jylietopup" class="bg-slate-700/50 border border-slate-600 p-3 rounded-xl outline-none focus:ring-2 focus:ring-yellow-400">
                </div>
            </div>

            <!-- SETTING UMUM -->
            <div class="glass rounded-2xl p-6 mb-6 card-hover">
                <div class="flex items-center gap-3 mb-5">
                    <div class="w-12 h-12 bg-cyan-500/20 rounded-xl flex items-center justify-center">
                        <i class="ri-settings-3-line text-2xl text-cyan-400"></i>
                    </div>
                    <h2 class="text-xl font-bold">Setting Umum</h2>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block mb-2 text-sm font-semibold text-slate-300">Status Toko</label>
                        <div class="flex gap-3">
                            <button type="button" onclick="setToko(true)" id="btn-buka" class="flex-1 bg-slate-700 hover:bg-green-600 py-3 rounded-xl font-bold admin-btn flex items-center justify-center gap-2">
                                <i class="ri-checkbox-circle-line"></i> BUKA
                            </button>
                            <button type="button" onclick="setToko(false)" id="btn-tutup" class="flex-1 bg-slate-700 hover:bg-red-600 py-3 rounded-xl font-bold admin-btn flex items-center justify-center gap-2">
                                <i class="ri-close-circle-line"></i> TUTUP
                            </button>
                        </div>
                    </div>
                    <div>
                        <label class="block mb-2 text-sm font-semibold text-slate-300">Username Telegram CS</label>
                        <input id="username-tele" type="text" placeholder="jyliestoreid" class="w-full bg-slate-700/50 border border-slate-600 p-3 rounded-xl outline-none focus:ring-2 focus:ring-cyan-400">
                    </div>
                </div>
            </div>

            <!-- TAMBAH GAME -->
            <div class="glass rounded-2xl p-6 mb-6 card-hover">
                <div class="flex items-center gap-3 mb-5">
                    <div class="w-12 h-12 bg-purple-500/20 rounded-xl flex items-center justify-center">
                        <i class="ri-gamepad-line text-2xl text-purple-400"></i>
                    </div>
                    <h2 class="text-xl font-bold">Tambah Game Baru</h2>
                </div>
                <div class="grid md:grid-cols-3 gap-3 mb-3">
                    <input id="newGameId" type="text" placeholder="ID: freefire" class="bg-slate-700/50 border border-slate-600 p-3 rounded-xl outline-none focus:ring-2 focus:ring-purple-400">
                    <input id="newGameName" type="text" placeholder="Nama: Free Fire" class="bg-slate-700/50 border border-slate-600 p-3 rounded-xl outline-none focus:ring-2 focus:ring-purple-400">
                    <input id="newGameLogo" type="text" placeholder="Link Logo" class="bg-slate-700/50 border border-slate-600 p-3 rounded-xl outline-none focus:ring-2 focus:ring-purple-400">
                </div>
                <button type="button" onclick="tambahGame()" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white py-3 rounded-xl font-bold admin-btn flex items-center justify-center gap-2">
                    <i class="ri-add-circle-line"></i> Tambah Game
                </button>
            </div>

            <!-- LIST GAME -->
            <div class="glass rounded-2xl p-6 mb-6 card-hover">
                <div class="flex items-center gap-3 mb-5">
                    <div class="w-12 h-12 bg-blue-500/20 rounded-xl flex items-center justify-center">
                        <i class="ri-list-check-2 text-2xl text-blue-400"></i>
                    </div>
                    <h2 class="text-xl font-bold">Kelola Game & Produk</h2>
                </div>
                <div id="produkList" class="space-y-4">Loading...</div>
            </div>

            <!-- ORDER -->
            <div class="glass rounded-2xl p-6 mb-6 card-hover">
                <div class="flex justify-between items-center mb-5">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-orange-500/20 rounded-xl flex items-center justify-center">
                            <i class="ri-file-list-3-line text-2xl text-orange-400"></i>
                        </div>
                        <h2 class="text-xl font-bold">Kelola Order</h2>
                    </div>
                    <button type="button" onclick="loadOrders()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-xl text-sm admin-btn flex items-center gap-2">
                        <i class="ri-refresh-line"></i> Refresh
                    </button>
                </div>
                <div class="flex gap-2 mb-4 overflow-x-auto">
                    <button type="button" onclick="filterOrder('all')" class="filter-btn bg-cyan-500 px-4 py-2 rounded-xl text-sm font-bold admin-btn whitespace-nowrap">Semua</button>
                    <button type="button" onclick="filterOrder('Diproses')" class="filter-btn bg-slate-700 px-4 py-2 rounded-xl text-sm admin-btn whitespace-nowrap">Diproses</button>
                    <button type="button" onclick="filterOrder('Selesai')" class="filter-btn bg-slate-700 px-4 py-2 rounded-xl text-sm admin-btn whitespace-nowrap">Selesai</button>
                </div>
                <div id="order-list" class="space-y-3 max-h-[500px] overflow-y-auto pr-2">
                    <p class="text-slate-500 text-center py-8">Klik Refresh buat load order</p>
                </div>
            </div>

            <!-- SIMPAN -->
            <button type="button" onclick="simpanSemua()" class="w-full bg-gradient-to-r from-green-500 to-emerald-500 hover:from-green-600 hover:to-emerald-600 py-4 rounded-xl font-bold text-lg admin-btn flex items-center justify-center gap-2 shadow-lg shadow-green-500/20">
                <i class="ri-save-line"></i> Simpan ke GitHub
            </button>
        </main>
    </div>

    <div id="toast"></div>

<!-- SCRIPT DI BAWAH + PAKE window.function BIAR GLOBAL -->
<script>
const CONFIG = {
  USER: "ownerjylie",
  PASS: "jylie547"
};

let db = { username_tele: '', toko_buka: true, games: [] };

function showToast(msg, sukses = true) {
  const toast = document.createElement('div');
  toast.className = `toast glass rounded-xl p-4 flex items-center gap-3 ${sukses? 'border-l-4 border-green-400' : 'border-l-4 border-red-400'}`;
  toast.innerHTML = `<i class="ri-${sukses? 'checkbox-circle' : 'error-warning'}-line text-2xl ${sukses? 'text-green-400' : 'text-red-400'}"></i><span>${msg}</span>`;
  document.getElementById('toast').appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// BALIKIN PAKE ONCLICK TAPI DIBUAT GLOBAL
window.login = function() {
  const loginMsg = document.getElementById('loginMsg');
  const user = document.getElementById('user').value.trim();
  const pass = document.getElementById('pass').value.trim();

  if(user!== CONFIG.USER || pass!== CONFIG.PASS) {
    loginMsg.innerText = 'Username atau Password salah!';
    return;
  }

  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('adminBox').style.display = 'block';
  loadData();
  loadLocalSettings();
  setTimeout(loadOrders, 1000);
}

window.logout = function() {
  document.getElementById('adminBox').style.display = 'none';
  document.getElementById('loginBox').style.display = 'flex';
  document.getElementById('user').value = '';
  document.getElementById('pass').value = '';
  document.getElementById('loginMsg').innerText = '';
}

function loadLocalSettings() {
  document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
  document.getElementById('gh-user').value = localStorage.getItem('gh_user') || '';
  document.getElementById('gh-repo').value = localStorage.getItem('gh_repo') || '';
}

window.setToko = function(status) {
  db.toko_buka = status;
  document.getElementById('btn-buka').className = status? 'flex-1 bg-green-600 ring-4 ring-green-400/50 py-3 rounded-xl font-bold admin-btn flex items-center justify-center gap-2' : 'flex-1 bg-slate-700 hover:bg-green-600 py-3 rounded-xl font-bold admin-btn flex items-center justify-center gap-2';
  document.getElementById('btn-tutup').className =!status? 'flex-1 bg-red-600 ring-4 ring-red-400/50 py-3 rounded-xl font-bold admin-btn flex items-center justify-center gap-2' : 'flex-1 bg-slate-700 hover:bg-red-600 py-3 rounded-xl font-bold admin-btn flex items-center justify-center gap-2';
  showToast(status? 'Toko dibuka' : 'Toko ditutup');
}

async function loadData() {
  try {
    const res = await fetch('db.json?' + Date.now());
    db = await res.json();
    document.getElementById('username-tele').value = db.username_tele || '';
    setToko(db.toko_buka!== false);
    renderProduk();
  } catch (e) {
    db = { username_tele: 'jyliestoreid', toko_buka: true, games: [] };
    showToast('Gagal load db.json, bikin baru', false);
    setToko(true);
    renderProduk();
  }
}

function renderProduk() {
  const wrap = document.getElementById('produkList');
  wrap.innerHTML = '';

  if (db.games.length === 0) {
    wrap.innerHTML = '<p class="text-slate-400 text-center py-8">Belum ada game. Tambah di atas.</p>';
    return;
  }

  db.games.forEach((game, gameIndex) => {
    const gameDiv = document.createElement('div');
    gameDiv.className = 'bg-slate-700/50 rounded-xl p-5 border border-slate-600';
    gameDiv.innerHTML = `
      <div class="flex justify-between items-start mb-4">
        <div class="flex items-center gap-4">
          <img src="${game.icon}" class="w-14 h-14 rounded-xl object-cover bg-slate-600 ring-2 ring-slate-500">
          <div>
            <input value="${game.name}" onchange="updateGame(${gameIndex}, 'name', this.value)" class="font-bold bg-transparent text-white text-lg outline-none">
            <p class="text-xs text-slate-400 mt-1">ID: ${game.id}</p>
          </div>
        <button type="button" onclick="hapusGame(${gameIndex})" class="bg-red-500/20 hover:bg-red-500/30 text-red-400 px-3 py-2 rounded-xl text-sm admin-btn"><i class="ri-delete-bin-line"></i></button>
      </div>
      <div class="mb-4">
        <input value="${game.icon}" onchange="updateGame(${gameIndex}, 'icon', this.value)" class="bg-slate-800/50 border border-slate-600 text-xs w-full p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-400" placeholder="Link Logo Game">
      </div>
      <div id="nominal-${gameIndex}" class="space-y-3 mb-4"></div>
      <button type="button" onclick="tambahNominal(${gameIndex})" class="w-full bg-slate-600/50 hover:bg-slate-600 border border-slate-500 py-3 rounded-xl text-sm admin-btn flex items-center justify-center gap-2">
        <i class="ri-add-line"></i> Tambah Nominal
      </button>
    `;
    wrap.appendChild(gameDiv);

    const nominalWrap = document.getElementById(`nominal-${gameIndex}`);
    game.products.forEach((item, itemIndex) => {
      const row = document.createElement('div');
      row.className = 'bg-slate-800/50 p-4 rounded-xl border border-slate-600';
      row.innerHTML = `
        <div class="flex gap-3 items-start mb-3">
          <input value="${item.name}" onchange="updateNominal(${gameIndex}, ${itemIndex}, 'name', this.value)" class="flex-1 bg-slate-700/50 border border-slate-600 p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-cyan-400" placeholder="Nama Item">
          <button type="button" onclick="hapusNominal(${gameIndex}, ${itemIndex})" class="bg-red-500/20 hover:bg-red-500/30 text-red-400 px-3 py-3 rounded-xl admin-btn"><i class="ri-close-line"></i></button>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs text-slate-400 mb-1 block">Harga Jual</label>
            <input value="${item.harga}" type="number" onchange="updateNominal(${gameIndex}, ${itemIndex}, 'harga', this.value)" class="w-full bg-slate-700/50 border border-slate-600 p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-green-400" placeholder="10000">
          </div>
          <div>
            <label class="text-xs text-slate-400 mb-1 block">Harga Asli</label>
            <input value="${item.harga_asli || ''}" type="number" onchange="updateNominal(${gameIndex}, ${itemIndex}, 'harga_asli', this.value)" class="w-full bg-slate-700/50 border border-slate-600 p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-yellow-400" placeholder="9000">
          </div>
        </div>
      `;
      nominalWrap.appendChild(row);
    });
  });
}

window.tambahGame = function() {
  const id = document.getElementById('newGameId').value.trim().toLowerCase().replace(/\s+/g, '');
  const name = document.getElementById('newGameName').value.trim();
  const icon = document.getElementById('newGam
