
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Test Login</title>
</head>
<body style="background:#0f172a;color:#fff;font-family:Arial;padding:20px">

    <div id="loginBox" style="max-width:300px;margin:100px auto;background:#1e293b;padding:20px;border-radius:12px">
        <h1 style="text-align:center;margin-bottom:20px">🔐 Test Login</h1>
        <input id="user" type="text" placeholder="Username" style="width:100%;padding:12px;margin-bottom:12px;background:#334155;border:1px solid #475569;border-radius:8px;color:#fff;font-size:16px">
        <input id="pass" type="password" placeholder="Password" style="width:100%;padding:12px;margin-bottom:12px;background:#334155;border:1px solid #475569;border-radius:8px;color:#fff;font-size:16px">
        <button type="button" onclick="login()" style="width:100%;padding:14px;background:#06b6d4;color:#0f172a;border:0;border-radius:8px;font-weight:700;font-size:16px">Login</button>
        <p id="msg" style="color:#f87171;text-align:center;margin-top:12px"></p>
    </div>

    <div id="sukses" style="display:none;text-align:center;margin-top:100px">
        <h1 style="font-size:32px;color:#4ade80">LOGIN BERHASIL! 🎉</h1>
        <p style="margin-top:16px">Kalo ini muncul, berarti tombol jalan.</p>
    </div>

<script>
function login() {
  alert('1. Tombol kepencet!');
  
  var u = document.getElementById('user').value;
  var p = document.getElementById('pass').value;
  
  alert('2. Username yang lu ketik: [' + u + ']');
  alert('3. Password yang lu ketik: [' + p + ']');
  
  u = u.trim().toLowerCase();
  p = p.trim();
  
  alert('4. Setelah di-trim: Username=[' + u + '] Password=[' + p + ']');
  
  if(u === 'ownerjylie' && p === 'jylie547') {
    alert('5. COCOK! Masuk dashboard...');
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('sukses').style.display = 'block';
  } else {
    alert('5. GAGAL! Yang bener: ownerjylie / jylie547');
    document.getElementById('msg').innerHTML = 'Salah bro! Cek alert tadi';
  }
}
</script>
</body>
</html>
