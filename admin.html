<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>Admin Panel - Jylie Topup</title>
    <style>
        *{font-family:Arial,sans-serif;box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        body{background:#0f172a;color:#fff}
        button{cursor:pointer;border:0}
        input{outline:none}
     .box{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:24px;margin-bottom:20px}
     .btn{background:#06b6d4;color:#0f172a;padding:16px;border-radius:10px;font-weight:700;width:100%;font-size:18px}
     .btn-green{background:#22c55e;color:#0f172a}
     .btn-red{background:#ef4444;color:#fff}
     .btn-gray{background:#475569;color:#fff}
     .input{width:100%;background:#334155;border:1px solid #475569;padding:14px;border-radius:10px;color:#fff;margin-bottom:12px;font-size:16px}
     .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="loginBox" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px">
        <div class="box" style="max-width:400px;width:100%">
            <h1 style="font-size:24px;font-weight:700;text-align:center;margin-bottom:24px">🔐 Admin Login</h1>
            <input id="user" class="input" type="text" placeholder="Username">
            <input id="pass" class="input" type="password" placeholder="Password">
            <button type="button" id="btnLogin" class="btn">Login</button>
            <p id="loginMsg" style="color:#f87171;font-size:14px;text-align:center;margin-top:12px;height:20px"></p>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="adminBox" style="display:none">
        <div style="background:#1e293b;padding:20px;position:sticky;top:0;border-bottom:1px solid #334155">
            <div style="max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center">
                <h1 style="font-size:22px;font-weight:700">🎮 Admin JylieTopup</h1>
                <button type="button" id="btnLogout" class="btn-red" style="padding:12px 24px;font-size:16px">Logout</button>
            </div>
        </div>

        <div style="max-width:1200px;margin:0 auto;padding:32px 16px">
            <!-- STATS -->
            <div class="grid2" style="margin-bottom:32px">
                <div class="box" style="padding:28px"><p style="color:#94a3b8;font-size:16px;margin-bottom:8px">Pendapatan Hari Ini</p><b style="font-size:36px;color:#4ade80" id="duit">Rp 0</b></div>
                <div class="box" style="padding:28px"><p style="color:#94a3b8;font-size:16px;margin-bottom:8px">Total Order</p><b style="font-size:36px;color:#22d3ee" id="total">0</b></div>
                <div class="box" style="padding:28px"><p style="color:#94a3b8;font-size:16px;margin-bottom:8px">Order Pending</p><b style="font-size:36px;color:#facc15" id="pending">0</b></div>
                <div class="box" style="padding:28px"><p style="color:#94a3b8;font-size:16px;margin-bottom:8px">Status Toko</p><b style="font-size:36px" id="sttoko">-</b></div>
            </div>

            <!-- SETTING GITHUB -->
            <div class="box" style="border:3px solid #eab308">
                <h2 style="font-size:22px;font-weight:700;margin-bottom:20px">⚙️ Setting GitHub - WAJIB ISI</h2>
                <input id="gh-token" class="input" type="password" placeholder="Token: ghp_xxx">
                <input id="gh-user" class="input" type="text" placeholder="Username: phzen60-cyber">
                <input id="gh-repo" class="input" type="text" placeholder="Repo: jylietopup">
            </div>

            <!-- SETTING UMUM - TOMBOL GEDE BANGET -->
            <div class="box">
                <h2 style="font-size:22px;font-weight:700;margin-bottom:20px">⚙️ Setting Umum</h2>
                <label style="display:block;margin-bottom:16px;font-size:20px;font-weight:600">Status Toko</label>
                <div style="display:flex;gap:16px;margin-bottom:24px">
                    <button type="button" id="btn-buka" class="btn-gray" style="flex:1;padding:28px;font-size:24px;font-weight:700;border-radius:12px">🟢 BUKA TOKO</button>
                    <button type="button" onclick="setToko(false)" id="btn-tutup" class="btn-gray" style="flex:1;padding:28px;font-size:24px;font-weight:700;border-radius:12px">🔴 TUTUP TOKO</button>
                </div>
                <label style="display:block;margin-bottom:12px;font-size:18px;font-weight:600">Username Telegram CS</label>
                <input id="username-tele" class="input" type="text" placeholder="jyliestoreid">
            </div>

            <!-- SIMPAN -->
            <button type="button" id="btnSimpan" class="btn btn-green" style="padding:24px;font-size:22px">🔒 Simpan ke GitHub</button>
            <p id="notif" style="text-align:center;font-size:18px;margin-top:16px;height:24px"></p>
        </div>
    </div>

<script>
// PAKE VAR BIAR KOMPATIBEL SEMUA HP
var CONFIG = { USER: "ownerjylie", PASS: "jylie547" };
var db = { username_tele: '', toko_buka: true, games: [] };

// TUNGGU HALAMAN KE-LOAD BARU PASANG EVENT
document.addEventListener('DOMContentLoaded', function() {
    
    // LOGIN
    document.getElementById('btnLogin').addEventListener('click', function() {
        var user = document.getElementById('user').value.trim().toLowerCase();
        var pass = document.getElementById('pass').value.trim();
        var msg = document.getElementById('loginMsg');
        
        if(user === CONFIG.USER && pass === CONFIG.PASS) {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('adminBox').style.display = 'block';
            loadData();
            loadLocalSettings();
        } else {
            msg.innerHTML = 'Username/Password salah!';
        }
    });

    // LOGOUT
    document.getElementById('btnLogout').addEventListener('click', function() {
        document.getElementById('adminBox').style.display = 'none';
        document.getElementById('loginBox').style.display = 'flex';
        document.getElementById('user').value = '';
        document.getElementById('pass').value = '';
        document.getElementById('loginMsg').innerHTML = '';
    });

    // BUKA TOKO
    document.getElementById('btn-buka').addEventListener('click', function() {
        setToko(true);
    });

    // TUTUP TOKO
    document.getElementById('btn-tutup').addEventListener('click', function() {
        setToko(false);
    });

    // SIMPAN
    document.getElementById('btnSimpan').addEventListener('click', function() {
        simpanSemua();
    });

});

function notif(msg, sukses) {
  var el = document.getElementById('notif');
  el.style.color = sukses===false? '#f87171' : '#4ade80';
  el.innerHTML = msg;
  setTimeout(function(){ el.innerHTML = '' }, 3000);
}

function loadLocalSettings() {
  document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
  document.getElementById('gh-user').value = localStorage.getItem('gh_user') || '';
  document.getElementById('gh-repo').value = localStorage.getItem('gh_repo') || '';
}

function setToko(status) {
  db.toko_buka = status;
  document.getElementById('btn-buka').style.background = status? '#16a34a' : '#475569';
  document.getElementById('btn-tutup').style.background =!status? '#dc2626' : '#475569';
  document.getElementById('sttoko').innerHTML = status? '<span style="color:#4ade80">BUKA</span>' : '<span style="color:#f87171">TUTUP</span>';
  notif(status? 'Toko dibuka' : 'Toko ditutup');
}

function loadData() {
  fetch('db.json?' + Date.now()).then(function(res){
    return res.json();
  }).then(function(data){
    db = data;
    document.getElementById('username-tele').value = db.username_tele || '';
    setToko(db.toko_buka!== false);
  }).catch(function(e){
    db = { username_tele: 'jyliestoreid', toko_buka: true, games: [] };
    notif('Gagal load db.json, bikin baru', false);
    setToko(true);
  });
}

function simpanSemua() {
  var token = document.getElementById('gh-token').value;
  var user = document.getElementById('gh-user').value;
  var repo = document.getElementById('gh-repo').value;
  if (!token ||!user ||!repo) return notif('Isi Setting GitHub dulu!', false);
  localStorage.setItem('gh_token', token);
  localStorage.setItem('gh_user', user);
  localStorage.setItem('gh_repo', repo);
  notif('Menyimpan ke GitHub...');
  db.username_tele = document.getElementById('username-tele').value;

  var content = btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2))));
  var apiUrl = 'https://api.github.com/repos/'+user+'/'+repo+'/contents/db.json';

  fetch(apiUrl, { headers: { 'Authorization': 'token '+token } }).then(function(getRes){
    return getRes.ok? getRes.json() : null;
  }).then(function(fileData){
    var body = { message: 'Update db.json dari Admin Panel', content: content };
    if(fileData && fileData.sha) body.sha = fileData.sha;
    return fetch(apiUrl, {
      method: 'PUT',
      headers: { 'Authorization': 'token '+token, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
  }).then(function(updateRes){
    if (updateRes.ok) {
      notif('✅ Sukses! Vercel auto-deploy 20 detik');
    } else {
      throw new Error('Gagal update');
    }
  }).catch(function(error){
    notif('❌ Gagal: ' + error.message, false);
  });
}
</script>
</body>
</html>
