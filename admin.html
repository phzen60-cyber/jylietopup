<!DOCTYPE html>
<html>
<body style="background:#0f172a;color:#fff;font-family:Arial;padding:20px">
  <div id="loginBox">
    <h1>🔐 Login Debug</h1>
    <input id="user" placeholder="Username" style="padding:12px;margin:8px;width:200px"><br>
    <input id="pass" type="password" placeholder="Password" style="padding:12px;margin:8px;width:200px"><br>
    <button id="btn" style="padding:16px 32px;background:#06b6d4;border:0;border-radius:8px;font-weight:700">Login</button>
    <p id="msg" style="color:red;margin-top:16px"></p>
  </div>

  <div id="adminBox" style="display:none">
    <h1 style="color:#4ade80">✅ BERHASIL MASUK!</h1>
    <button onclick="alert('BUKA KEPENCET')" style="padding:20px;font-size:20px">🟢 BUKA</button>
  </div>

<script>
alert('DEBUG 1: Script mulai jalan');

// TEST VARIABEL
var CONFIG = { USER: "ownerjylie", PASS: "jylie547" };
alert('DEBUG 2: Variabel CONFIG aman');

var db = { username_tele: '', toko_buka: true, games: [] };
alert('DEBUG 3: Variabel db aman');

// TEST GET ELEMENT
var btnLogin = document.getElementById('btn');
alert('DEBUG 4: Tombol login ketemu = ' + (btnLogin !== null));

// PASANG EVENT
btnLogin.onclick = function() {
  alert('DEBUG 5: Tombol kepencet!');
  
  var u = document.getElementById('user').value;
  var p = document.getElementById('pass').value;
  
  alert('DEBUG 6: User: ' + u + ' | Pass: ' + p);
  
  if(u.trim().toLowerCase() === CONFIG.USER && p.trim() === CONFIG.PASS) {
    alert('DEBUG 7: Login bener, mau pindah halaman');
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('adminBox').style.display = 'block';
    alert('DEBUG 8: SUKSES MASUK DASHBOARD');
  } else {
    alert('DEBUG 7 GAGAL: Username/password salah');
    document.getElementById('msg').innerHTML = 'Salah! Pake ownerjylie / jylie547';
  }
};

alert('DEBUG 9: Semua event kepasang. Siap dipake.');
</script>
</body>
</html>
