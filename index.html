<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jylie Topup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins&display=swap');
    body { font-family: 'Poppins', sans-serif; background: #0B1120; }
    .font-gaming { font-family: 'Orbitron', sans-serif; }
    .card-glow:hover { box-shadow: 0 0 20px rgba(6, 182, 212, 0.5); }
  </style>
</head>
<body class="bg-[#0B1120] text-slate-200">

  <!-- HALAMAN 1: LIST GAME -->
  <div id="page-game">
    <nav class="bg-slate-900/70 backdrop-blur-lg sticky top-0 z-50 border-b border-slate-700">
      <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
        <h1 class="font-gaming text-2xl text-cyan-400"><i class="fa-solid fa-gamepad"></i> Jylie Topup</h1>
        <a href="https://wa.me/62895336789308" class="bg-green-500 px-3 py-1 rounded-lg text-sm"><i class="fa-brands fa-whatsapp"></i> CS</a>
      </div>
    </nav>

    <section class="max-w-6xl mx-auto text-center py-12 px-4">
      <h2 class="font-gaming text-4xl mb-4">TOP UP <span class="text-cyan-400">TERMURAH</span></h2>
      <p class="text-slate-400">Proses cepat 1 detik. Harga paling murah se-Indonesia.</p>
    </section>

    <main class="max-w-6xl mx-auto px-4 pb-20">
      <h3 class="font-gaming text-xl mb-6"><span class="w-1 h-6 bg-cyan-400 inline-block mr-2"></span>PILIH GAME</h3>
      <div id="game-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
      <div id="loading" class="text-center py-20"><i class="fa-solid fa-spinner fa-spin text-4xl text-cyan-400"></i></div>
    </main>
  </div>

  <!-- HALAMAN 2: LIST NOMINAL -->
  <div id="page-nominal" class="hidden">
    <nav class="bg-slate-900/70 backdrop-blur-lg sticky top-0 z-50 border-b border-slate-700">
      <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-4">
        <button onclick="backToGame()" class="text-cyan-400"><i class="fa-solid fa-arrow-left text-xl"></i></button>
        <h1 id="game-title" class="font-gaming text-xl text-cyan-400"></h1>
      </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
      <h3 class="font-gaming text-xl mb-6"><span class="w-1 h-6 bg-cyan-400 inline-block mr-2"></span>PILIH NOMINAL</h3>
      <div id="nominal-list" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
    </main>
  </div>

<script>
async function loadGames() {
  try {
    const res = await fetch('/api/getHarga');
    const data = await res.json();
    
    const gameList = document.getElementById('game-list');
    const loading = document.getElementById('loading');
    loading.style.display = 'none';
    
    data.produk.forEach(game => {
      gameList.innerHTML += `
        <div onclick="showNominal('${game.id}')" class="card-glow bg-slate-800/50 p-4 rounded-xl cursor-pointer text-center border border-slate-700 hover:border-cyan-400 transition">
          <img src="${game.logo}" class="w-16 h-16 mx-auto rounded-lg mb-2" alt="${game.nama}">
          <p class="font-gaming text-sm">${game.nama}</p>
        </div>
      `;
    });
    
    window.allData = data;
    
  } catch (error) {
    document.getElementById('loading').innerHTML = '<p class="text-red-400">Gagal load game 😭 Cek koneksi</p>';
    console.error(error);
  }
}

function showNominal(gameId) {
  const game = window.allData.produk.find(p => p.id === gameId);
  document.getElementById('page-game').style.display = 'none';
  document.getElementById('page-nominal').style.display = 'block';
  document.getElementById('game-title').innerText = game.nama;
  
  const nominalList = document.getElementById('nominal-list');
  nominalList.innerHTML = '';
  
  game.nominal.forEach(item => {
    const pesan = `Halo kak, mau order ${game.nama} ${item.nama} Rp${item.harga.toLocaleString('id-ID')}`;
    const waLink = `https://wa.me/${window.allData.nomor_wa}?text=${encodeURIComponent(pesan)}`;
    nominalList.innerHTML += `
      <a href="${waLink}" target="_blank" class="block bg-slate-800/50 p-4 rounded-xl flex justify-between items-center border border-slate-700 hover:border-cyan-400 transition">
        <span>${item.nama}</span>
        <span class="text-cyan-400 font-bold">Rp${item.harga.toLocaleString('id-ID')}</span>
      </a>
    `;
  });
}

function backToGame() {
  document.getElementById('page-game').style.display = 'block';
  document.getElementById('page-nominal').style.display = 'none';
}

loadGames();
</script>

</body>
  </html>
