<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jylie Topup - Top Up Game Murah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
       .game-card:hover { transform: translateY(-5px); }
       .modal { background: rgba(0,0,0,0.8); }
    </style>
</head>
<body class="bg-slate-900 text-white">
    <header class="bg-slate-800 shadow-lg">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold text-cyan-400">🎮 Jylie Topup</h1>
            <a id="cs-button" href="#" target="_blank" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded-lg text-sm">
                CS
            </a>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div id="main-menu">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold">TOP UP <span class="text-cyan-400">TERMURAH</span></h2>
                <p class="text-slate-400 mt-2">Proses cepat 5 menit. Harga paling murah se-Indonesia.</p>
            </div>
            <h3 class="text-xl font-semibold mb-4 border-l-4 border-cyan-400 pl-3">PILIH GAME</h3>
            <div id="game-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
                <p class="text-slate-400 col-span-full text-center">Memuat game...</p>
            </div>
        </div>

        <div id="product-list-container" class="mt-10 hidden">
            <button id="back-button" class="mb-4 bg-slate-700 hover:bg-slate-600 py-2 px-4 rounded-lg text-sm">&larr; Kembali Pilih Game</button>
            <h3 id="product-title" class="text-2xl font-bold mb-4"></h3>
            <div id="product-list" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            </div>
        </div>
    </main>

    <!-- MODAL CHECKOUT - INI DOANG YG NAMBAH -->
    <div id="qris-modal" class="modal fixed inset-0 z-50 hidden items-center justify-center p-4">
        <div class="bg-slate-800 rounded-xl p-6 w-full max-w-sm">
            <h3 class="text-xl font-bold mb-4 text-center">Checkout</h3>
            <div id="order-detail" class="bg-slate-700 p-3 rounded-lg mb-4 text-sm"></div>

            <div class="bg-yellow-500/20 border border-yellow-500 p-3 rounded-lg mb-4 text-xs">
                <p class="font-bold text-yellow-400">PENTING!</p>
                <p>Tulis kode <span id="kode-unik" class="font-bold text-white"></span> di berita transfer QRIS</p>
            </div>

            <label class="block mb-2 text-sm font-semibold">ID Game / UID</label>
            <input id="player-id" type="number" placeholder="Masukkan 8-12 digit ID"
                   class="w-full bg-slate-700 p-3 rounded-lg mb-1 outline-none focus:ring-2 focus:ring-cyan-400">

            <label class="block mb-2 text-sm font-semibold mt-3">Nama Rekening Pengirim</label>
            <input id="nama-pengirim" type="text" placeholder="Contoh: Budi Santoso"
                   class="w-full bg-slate-700 p-3 rounded-lg mb-1 outline-none focus:ring-2 focus:ring-cyan-400">
            <p id="id-error" class="text-red-400 text-xs mb-3 hidden"></p>

            <p class="text-sm text-center mb-3 mt-4">Scan QRIS untuk bayar:</p>
            <img src="/images/qris.png" alt="QRIS" class="w-full rounded-lg mb-4 bg-white p-2">

            <div class="flex gap-2">
                <button id="cancel-btn" class="flex-1 bg-slate-600 hover:bg-slate-500 py-3 rounded-lg font-bold">Batal</button>
                <button id="confirm-btn" class="flex-1 bg-cyan-500 hover:bg-cyan-600 text-slate-900 py-3 rounded-lg font-bold">Saya Sudah Bayar</button>
            </div>
        </div>
    </div>

    <script>
        // GANTI INI PAKE TOKEN + ID TELEGRAM LU
           const TELEGRAM_BOT_TOKEN = '8670800551:AAFJJ6m-Y8njC1HUmlRZ2vNvsADFpSiZp5w';
        const TELEGRAM_CHAT_ID = '6636537299';

        const gameListEl = document.getElementById('game-list');
        const mainMenuEl = document.getElementById('main-menu');
        const productListContainerEl = document.getElementById('product-list-container');
        const productListEl = document.getElementById('product-list');
        const productTitleEl = document.getElementById('product-title');
        const backButton = document.getElementById('back-button');
        const csButton = document.getElementById('cs-button');

        const qrisModal = document.getElementById('qris-modal');
        const orderDetailEl = document.getElementById('order-detail');
        const playerIdInput = document.getElementById('player-id');
        const namaPengirimInput = document.getElementById('nama-pengirim');
        const idError = document.getElementById('id-error');
        const cancelBtn = document.getElementById('cancel-btn');
        const confirmBtn = document.getElementById('confirm-btn');
        const kodeUnikEl = document.getElementById('kode-unik');

        let db = {};
        let currentOrder = {};

        function generateKodeUnik() {
            return 'JYLIE-' + Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        async function loadData() {
            try {
                const response = await fetch('harga.json?v=' + Date.now());
                if (!response.ok) throw new Error('File harga.json tidak ditemukan');
                db = await response.json();
                csButton.href = `https://wa.me/${db.nomor_wa}`;
                renderGames();
            } catch (error) {
                gameListEl.innerHTML = `<p class="text-red-500 col-span-full text-center">Gagal: ${error.message}</p>`;
            }
        }

        function renderGames() {
            gameListEl.innerHTML = '';
            if (!db.produk || db.produk.length === 0) {
                 gameListEl.innerHTML = `<p class="text-yellow-500 col-span-full text-center">Belum ada produk</p>`;
                 return;
            }
            db.produk.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card bg-slate-800 rounded-lg p-4 text-center cursor-pointer transition-transform duration-300';
                card.innerHTML = `
                    <img src="${game.logo}" alt="${game.nama}" class="w-16 h-16 mx-auto rounded-lg mb-2 object-cover bg-slate-700">
                    <p class="font-semibold text-sm">${game.nama}</p>
                `;
                card.addEventListener('click', () => showProducts(game));
                gameListEl.appendChild(card);
            });
        }

        function showProducts(game) {
            mainMenuEl.classList.add('hidden');
            productListContainerEl.classList.remove('hidden');
            productTitleEl.textContent = `Top Up ${game.nama}`;
            productListEl.innerHTML = '';

            game.nominal.forEach(item => {
                const productCard = document.createElement('div');
                productCard.className = 'bg-slate-800 rounded-lg p-4 flex flex-col justify-between';
                productCard.innerHTML = `
                    <div>
                        <p class="font-bold">${item.nama}</p>
                        <p class="text-cyan-400 font-semibold my-2">Rp${item.harga.toLocaleString('id-ID')}</p>
                    </div>
                    <button class="beli-btn block text-center w-full bg-cyan-500 hover:bg-cyan-600 text-slate-900 font-bold py-2 px-4 rounded-lg text-sm mt-2">
                        Beli
                    </button>
                `;
                productCard.querySelector('.beli-btn').addEventListener('click', () => openQrisModal(game, item));
                productListEl.appendChild(productCard);
            });
        }

        function openQrisModal(game, item) {
            const kodeUnik = generateKodeUnik();
            currentOrder = { game: game.nama, item: item.nama, harga: item.harga, kode: kodeUnik };
            kodeUnikEl.textContent = kodeUnik;
            orderDetailEl.innerHTML = `
                <p><span class="text-slate-400">Game:</span> ${game.nama}</p>
                <p><span class="text-slate-400">Item:</span> ${item.nama}</p>
                <p><span class="text-slate-400">Harga:</span> <span class="text-cyan-400 font-bold">Rp${item.harga.toLocaleString('id-ID')}</span></p>
            `;
            playerIdInput.value = '';
            namaPengirimInput.value = '';
            idError.classList.add('hidden');
            qrisModal.classList.remove('hidden');
            qrisModal.classList.add('flex');
        }

        function closeQrisModal() {
            qrisModal.classList.add('hidden');
            qrisModal.classList.remove('flex');
        }

        async function kirimKeTelegram(pesan) {
            if(TELEGRAM_BOT_TOKEN === 'GANTI_TOKEN_BOT_LU') return;
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: pesan, parse_mode: 'HTML' })
            });
        }

          async function validateAndCheckout() {
    const playerId = playerIdInput.value;
    const namaPengirim = namaPengirimInput.value.trim();

    if (!/^\d{8,12}$/.test(playerId)) {
      idError.textContent = 'ID harus 8-12 angka!';
      idError.classList.remove('hidden');
      playerIdInput.focus();
      return;
    }
    if (namaPengirim.length < 3) {
      idError.textContent = 'Nama pengirim wajib diisi minimal 3 huruf!';
      idError.classList.remove('hidden');
      namaPengirimInput.focus();
      return;
    }

    const textWA = `Halo min, saya sudah transfer:\nKode: ${currentOrder.kode}\nGame: ${currentOrder.game}\nItem: ${currentOrder.item}\nID: ${playerId}\nNama: ${namaPengirim}\nTotal: Rp${currentOrder.harga.toLocaleString('id-ID')}`;
    
    const textTelegram = `<b>🔥 ORDER BARU MASUK</b>

<b>Kode:</b> <code>${currentOrder.kode}</code>
<b>Game:</b> ${currentOrder.game}
<b>Item:</b> ${currentOrder.item}
<b>ID Player:</b> <code>${playerId}</code>
<b>Nama:</b> ${namaPengirim}
<b>Total:</b> Rp${currentOrder.harga.toLocaleString('id-ID')}

<b>Cek mutasi pake berita:</b> <code>${currentOrder.kode}</code>`;

    await kirimKeTelegram(textTelegram);
    window.open(`https://wa.me/${db.nomor_wa}?text=${encodeURIComponent(textWA)}`, '_blank');
    closeQrisModal();
  }

  backButton.addEventListener('click', () => {
    productListContainerEl.classList.add('hidden');
    mainMenuEl.classList.remove('hidden');
  });

  cancelBtn.addEventListener('click', closeQrisModal);
  confirmBtn.addEventListener('click', validateAndCheckout);
  qrisModal.addEventListener('click', (e) => { if (e.target === qrisModal) closeQrisModal(); });
  playerIdInput.addEventListener('input', () => idError.classList.add('hidden'));
  namaPengirimInput.addEventListener('input', () => idError.classList.add('hidden'));

  loadData();
</script>
</body>
</html>
