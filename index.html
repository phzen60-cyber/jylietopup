<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jylie Shop - Diamond Free Fire Termurah</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="logo.png" alt="Jylie Shop Logo" class="logo">
      <h1>JYLIE SHOP</h1>
      <p class="subtitle">Diamond Free Fire Aman, Murah, Terpercaya</p>
    </div>

    <!-- Filter Harga -->
    <div class="filters">
      <button class="filter-btn active" onclick="filterProducts('all')">Semua</button>
      <button class="filter-btn" onclick="filterProducts('murah')">Di bawah 50rb</button>
      <button class="filter-btn" onclick="filterProducts('sedang')">50rb - 100rb</button>
      <button class="filter-btn" onclick="filterProducts('mahal')">Di atas 100rb</button>
      <button class="filter-btn" onclick="filterProducts('best')">Best Deal</button>
    </div>

    <div class="products" id="products"></div>
    <p class="note">*Proses otomatis 1-3 menit. 100% Legal & Aman.</p>
  </div>

  <!-- WA Melayang - GANTI NOMOR WA KAMU -->
  <a href="https://wa.me/62895336789308?text=Halo%20JYLIE%20SHOP,%20mau%20tanya%20topup%20FF" target="_blank" class="wa-float">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
      <path d="M16.6 14c-.2-.1-1.5-.7-1.7-.8-.2-.1-.4-.1-.6.1-.2.2-.6.8-.8 1-.1.2-.3.2-.5.1-.2-.1-1-.4-1.9-1.2-.7-.6-1.2-1.4-1.3-1.6-.1-.2 0-.4.1-.5.1-.1.2-.2.4-.3.1-.1.2-.2.3-.3.1-.1.1-.2.2-.3.1-.1.1-.2 0-.4-.1-.1-.6-1.5-.8-2-.2-.5-.4-.6-.4-.2 0-.4 0-.6 0-.2.1-.5.2-.8.4-.3.2-.9.9-.9 2.2 0 1.3 1 2.6 1.1 2.8.1.2 1.9 3 4.7 4.2 2.8 1.2 2.8.8 3.3.8.5 0 1.7-.7 1.9-1.4.2-.7.2-1.3.2-1.4 0-.1-.2-.1-.4-.2zM12 2C6.5 2 2 6.5 2 12c0 1.9.5 3.6 1.4 5.1L2 22l5-1.3c1.4.8 3.1 1.3 5 1.3 5.5 0 10-4.5 10-10S17.5 2 12 2z"/>
    </svg>
    <span>Chat Admin</span>
  </a>

  <!-- Modal QRIS + Input ID -->
  <div id="qrisModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h2>Lengkapi Data</h2>
      <p id="modalDm"></p>
      <div class="total" id="modalTotal"></div>
      
      <div class="input-group">
        <label>ID Free Fire</label>
        <input type="text" id="gameId" placeholder="Contoh: 12345678" maxlength="12" inputmode="numeric">
        <span class="error-msg" id="idError"></span>
      </div>
      
      <img src="qris.jpg" alt="QRIS JYLIE SHOP">
      <p style="font-size: 14px; color: #94a3b8; margin-bottom: 16px;">1. Masukkan ID Game<br>2. Scan QRIS & Bayar sesuai nominal<br>3. Klik tombol konfirmasi</p>
      <button class="btn btn-wa" onclick="konfirmasiWA()">Sudah Bayar, Konfirmasi WA</button>
      <button class="btn btn-close" onclick="closeModal()">Tutup</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
